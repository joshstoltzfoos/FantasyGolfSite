<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phil's Fantasy Golf League</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-image: linear-gradient(rgba(10, 61, 42, 0.88), rgba(10, 61, 42, 0.92)), url('https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Amen_Corner_Augusta_National.jpg/1920px-Amen_Corner_Augusta_National.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.2), 0 8px 10px -6px rgb(0 0 0 / 0.2); }
    .leaderboard-table tr:hover { background-color: #f3f4f6; }
    .rank-1 { color: #d4af77; } .rank-2 { color: #c0c0c0; } .rank-3 { color: #cd7f32; }
    .under-par { color: #ef4444 !important; font-weight: 600; }
    .modal { animation: modalPop 0.3s ease-out forwards; }
    @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="text-white min-h-screen">
  <div class="max-w-6xl mx-auto p-4 md:p-6">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-golf-ball text-5xl text-[#d4af77]"></i>
        <div>
          <h1 class="text-4xl font-bold tracking-tight">Phil's Fantasy Golf League</h1>
          <p class="text-green-300 text-sm -mt-1">2026 Masters • Best 4 scores count • MC = worst made-cut score</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <button onclick="openBulkUploadModal()" 
                class="flex items-center gap-2 bg-white/10 hover:bg-white/20 border border-white/30 rounded-3xl px-6 py-3 text-white font-medium transition-colors">
          <i class="fa-solid fa-file-import"></i>
          <span>Bulk Upload Rosters</span>
        </button>
        <button onclick="manualRefresh()" 
                class="flex items-center justify-center w-10 h-10 bg-white/10 hover:bg-white/20 border border-white/30 rounded-3xl text-[#d4af77]">
          <i class="fa-solid fa-rotate text-xl"></i>
        </button>
      </div>
    </div>

    <div id="last-updated" class="text-sm text-green-300 font-medium mb-8 text-right"></div>

    <!-- Leaderboard -->
    <div class="mb-12">
      <h2 class="text-3xl font-semibold mb-4">Leaderboard</h2>
      <div class="card bg-white/10 backdrop-blur-xl rounded-3xl p-1 shadow-2xl overflow-hidden">
        <table class="w-full leaderboard-table bg-transparent rounded-3xl">
          <thead class="bg-gradient-to-r from-green-800 to-[#0a3d2a]">
            <tr>
              <th class="px-6 py-5 text-left font-medium w-16">Rank</th>
              <th class="px-6 py-5 text-left font-medium">Team</th>
              <th class="px-6 py-5 text-right font-medium">Score (best 4)</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body" class="text-xl"></tbody>
        </table>
      </div>
    </div>

    <!-- Detailed Team Rosters -->
    <div>
      <h2 class="text-3xl font-semibold mb-4">Detailed Team Rosters</h2>
      <div id="detailed-rosters" class="space-y-8"></div>
    </div>
  </div>

  <!-- Bulk Upload Modal -->
  <div id="bulk-modal" onclick="if(event.target===this)hideBulkModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div onclick="event.stopImmediatePropagation()" class="modal card bg-[#0a3d2a] border border-[#d4af77] rounded-3xl p-8 w-full max-w-2xl mx-4">
      <h3 class="text-3xl font-bold mb-6">Bulk Upload Rosters</h3>
      <p class="text-green-300 mb-4 text-sm">Paste from Google Sheets (one line per player):</p>
      <p class="text-xs text-white/60 mb-3">Team, Player Name<br>Example: Gerald, Scottie Scheffler</p>
      <textarea id="bulk-textarea" rows="14" 
                class="w-full bg-white/10 border border-white/30 rounded-3xl px-6 py-4 text-white font-mono text-sm resize-y"
                placeholder="Gerald, Scottie Scheffler&#10;Gerald, Rory McIlroy&#10;Josh, Jon Rahm&#10;..."></textarea>
      <div class="flex gap-4 mt-8">
        <button onclick="hideBulkModal()" class="flex-1 py-4 rounded-3xl border border-white/30 font-medium">Cancel</button>
        <button onclick="processBulkUpload()" class="flex-1 py-4 bg-[#d4af77] hover:bg-amber-300 text-[#0a3d2a] rounded-3xl font-semibold">Upload & Replace All Rosters</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== CONFIG ====================
    const teamNames = ["Gerald", "Josh", "Phil", "Patrick", "Wallace", "Ricky", "Roger", "Graham", "Doug", "Nick"];
    const createTeamsObj = () => {
      const obj = {};
      teamNames.forEach(n => obj[n] = []);
      return obj;
    };

    let config = JSON.parse(localStorage.getItem('fantasyGolfConfig')) || {
      currentTournamentKey: "2026-masters",
      tournaments: {
        "2026-masters": {
          name: "2026 Masters",
          year: "2026",
          tournId: "536",
          teams: createTeamsObj()
        }
      }
    };
    if (!localStorage.getItem('fantasyGolfConfig')) localStorage.setItem('fantasyGolfConfig', JSON.stringify(config));

    let currentLeaderboardData = null;
    let dataCache = {};
    let isTournamentOver = false;
    let refreshInterval = null;

    const RAPIDAPI_KEY = "e055e416ddmsh5f6b17a6f1eb52dp19a93cjsncf505c7264e2";
    const RAPIDAPI_HOST = "live-golf-data.p.rapidapi.com";

    // ==================== REFRESH LOGIC (exactly as requested) ====================
    function isRefreshWindow() {
      const now = new Date();
      const etHour = parseInt(new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/New_York',
        hour: 'numeric',
        hour12: false
      }).format(now), 10);
      return etHour >= 7 && etHour < 20; // 7AM–7:59PM ET
    }

    async function fetchRapidAPI(endpoint, params = {}) {
      const url = new URL(`https://${RAPIDAPI_HOST}${endpoint}`);
      Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
      try {
        const res = await fetch(url, {
          headers: { 'x-rapidapi-key': RAPIDAPI_KEY, 'x-rapidapi-host': RAPIDAPI_HOST }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } catch (e) {
        console.error("API error", e);
        return null;
      }
    }

    async function fetchForTournament() {
      const key = config.currentTournamentKey;
      if (dataCache[key]) return dataCache[key];

      const tour = config.tournaments[key];
      if (!tour?.year || !tour?.tournId) return null;

      const data = await fetchRapidAPI('/leaderboard', { year: tour.year, tournId: tour.tournId });
      if (data) dataCache[key] = data;
      return data;
    }

    function isTournamentCompleted(data) {
      if (!data?.leaderboardRows?.length) return false;
      const finished = new Set(["f", "finished", "cut", "wd", "dq"]);
      return data.leaderboardRows.every(p => {
        const status = (p.status || p.thru || "").toString().toLowerCase().trim();
        return finished.has(status) || status === "f" || status === "-";
      });
    }

    async function loadCurrentTournamentData() {
      if (isTournamentOver) return;
      const data = await fetchForTournament();
      if (data) {
        currentLeaderboardData = data;
        isTournamentOver = isTournamentCompleted(data);
        if (isTournamentOver) {
          console.log("%c🏁 Tournament finished – automatic refreshes stopped", "color:#d4af77;font-weight:700");
          if (refreshInterval) clearInterval(refreshInterval);
        }
      }
      updateLastUpdated();
      return data;
    }

    function updateLastUpdated() {
      const el = document.getElementById('last-updated');
      const now = new Date();
      const etTime = now.toLocaleTimeString('en-US', {
        timeZone: 'America/New_York',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      });
      const status = isTournamentOver ? ' – Tournament Complete (refreshes stopped)' : '';
      el.textContent = `Last updated: ${etTime} ET${status}`;
    }

    function startRefreshCycle() {
      if (refreshInterval) clearInterval(refreshInterval);
      refreshInterval = setInterval(() => {
        if (isTournamentOver) return;
        if (isRefreshWindow()) {
          loadCurrentTournamentData().then(() => renderEverything());
        }
      }, 180000); // 3 minutes
    }

    // ==================== FUZZY NAME MATCHING ====================
    function normalize(str) {
      return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
    }

    function findPlayerInLeaderboard(desiredName, rows) {
      if (!rows) return null;
      const normInput = normalize(desiredName);

      // Exact match first
      let match = rows.find(pl => {
        const full = normalize(`${pl.firstName || ''} ${pl.lastName || ''}`);
        return full === normInput;
      });
      if (match) return match;

      // Fuzzy match: substring or word overlap
      match = rows.find(pl => {
        const full = normalize(`${pl.firstName || ''} ${pl.lastName || ''}`);
        if (full.includes(normInput) || normInput.includes(full)) return true;
        const inputWords = normInput.split(' ').filter(Boolean);
        return inputWords.every(word => full.includes(word));
      });
      if (match) return match;

      // Last resort: best partial match
      let best = null;
      let bestScore = 0;
      rows.forEach(pl => {
        const full = normalize(`${pl.firstName || ''} ${pl.lastName || ''}`);
        const score = Math.max(
          (full.includes(normInput) ? 1 : 0),
          normInput.split(' ').filter(w => full.includes(w)).length / Math.max(normInput.split(' ').length, 1)
        );
        if (score > bestScore) {
          bestScore = score;
          best = pl;
        }
      });
      return bestScore > 0.6 ? best : null;
    }

    function getPlayerScore(playerName, data) {
      if (!data?.leaderboardRows) return { totalToPar: 999, rounds: ["—","—","—","—"], thru: "—", teeTime: "—", isMC: true };

      const p = findPlayerInLeaderboard(playerName, data.leaderboardRows);
      if (!p) return { totalToPar: 999, rounds: ["—","—","—","—"], thru: "—", teeTime: "—", isMC: true };

      let totalToPar = p.total === "E" ? 0 : parseInt(p.total) || 0;
      const roundsData = p.rounds || [];
      const rounds = Array(4).fill("—");
      roundsData.forEach(r => {
        const idx = (r.roundId || 1) - 1;
        if (idx >= 0 && idx < 4) rounds[idx] = r.scoreToPar === "E" ? "E" : (parseInt(r.scoreToPar) || 0);
      });

      const isMC = ["cut", "wd", "dq"].includes((p.status || "").toLowerCase()) || (p.thru || "").toLowerCase() === "cut";

      return {
        totalToPar,
        rounds,
        thru: p.thru === "-" ? "F" : (p.thru || "—"),
        teeTime: p.teeTime || "—",
        isMC
      };
    }

    function getCutLineWorstToPar(data) {
      if (!data?.leaderboardRows?.length) return 999;
      const madeCut = data.leaderboardRows
        .map(p => {
          const score = getPlayerScore(`${p.firstName} ${p.lastName}`, data);
          return score.isMC ? null : score.totalToPar;
        })
        .filter(s => s !== null);
      return madeCut.length ? Math.max(...madeCut) : 999;
    }

    function calculateTeamScore(teamName, data) {
      if (!data) return { score: 999, players: [] };
      const roster = config.tournaments[config.currentTournamentKey]?.teams?.[teamName] || [];
      if (!roster.length) return { score: 999, players: [] };

      const cutLine = getCutLineWorstToPar(data);
      const playerScores = roster.map(name => {
        const scoreObj = getPlayerScore(name, data);
        const adjusted = scoreObj.isMC ? cutLine : scoreObj.totalToPar;
        return { name, adjusted, ...scoreObj };
      });

      playerScores.sort((a, b) => a.adjusted - b.adjusted);
      const best4 = playerScores.slice(0, 4);
      const total = best4.reduce((sum, p) => sum + p.adjusted, 0);

      return { score: total, players: playerScores };
    }

    // ==================== RENDERING ====================
    function renderLeaderboard() {
      const tbody = document.getElementById('leaderboard-body');
      tbody.innerHTML = '';

      const teamsData = teamNames.map(name => {
        const result = calculateTeamScore(name, currentLeaderboardData);
        return { name, score: result.score };
      }).sort((a, b) => a.score - b.score);

      teamsData.forEach((team, i) => {
        const row = document.createElement('tr');
        row.className = 'border-b border-white/10 last:border-none';
        const rankHTML = i === 0 ? `<span class="rank-1">1</span>` : i === 1 ? `<span class="rank-2">2</span>` : i === 2 ? `<span class="rank-3">3</span>` : `<span>${i + 1}</span>`;
        const displayScore = team.score === 999 ? '—' : (team.score > 0 ? `+${team.score}` : team.score);
        row.innerHTML = `
          <td class="px-6 py-6 font-semibold">${rankHTML}</td>
          <td class="px-6 py-6 font-medium">${team.name}</td>
          <td class="px-6 py-6 text-right font-semibold">${displayScore}</td>
        `;
        tbody.appendChild(row);
      });
    }

    function renderDetailedRosters() {
      const container = document.getElementById('detailed-rosters');
      container.innerHTML = '';

      teamNames.forEach(teamName => {
        const result = calculateTeamScore(teamName, currentLeaderboardData);
        const playersHTML = result.players.map(p => {
          const scoreClass = p.isMC ? 'line-through text-red-400' : (p.adjusted < 0 ? 'under-par' : '');
          const mcLabel = p.isMC ? `<span class="text-xs bg-red-500/80 px-2 py-px rounded ml-2">MC</span>` : '';
          
          let statusHTML = '';
          if (p.teeTime && (p.thru === "—" || p.thru === "F")) {
            statusHTML = `<div class="text-sm text-amber-300">Tee: ${p.teeTime}</div>`;
          } else {
            statusHTML = `<div class="text-sm text-white/70">Thru: ${p.thru}</div>`;
          }

          const roundsHTML = p.rounds.map((r, i) => 
            `<div class="text-center"><span class="text-xs text-white/50">R${i+1}</span><br><span class="${typeof r === 'number' && r < 0 ? 'under-par' : ''}">${r}</span></div>`
          ).join('');

          return `
            <div class="flex flex-col md:flex-row md:items-center justify-between bg-white/5 rounded-3xl px-6 py-4 gap-4">
              <div class="font-medium flex-1">${p.name}</div>
              <div class="flex-1">${statusHTML}</div>
              <div class="flex gap-6 text-sm">${roundsHTML}</div>
              <div class="font-semibold text-xl ${scoreClass}">${p.adjusted > 0 ? '+' : ''}${p.adjusted}${mcLabel}</div>
            </div>`;
        }).join('');

        const card = document.createElement('div');
        card.className = 'card bg-white/10 backdrop-blur-xl rounded-3xl p-6';
        card.innerHTML = `
          <div class="flex justify-between items-baseline mb-6">
            <h3 class="text-2xl font-semibold">${teamName}</h3>
            <div class="text-right">
              <div class="text-sm text-green-300">Best 4 total</div>
              <div class="text-4xl font-bold">${result.score === 999 ? '—' : (result.score > 0 ? `+${result.score}` : result.score)}</div>
            </div>
          </div>
          <div class="space-y-3">${playersHTML || '<p class="text-white/40 italic py-8 text-center">No players yet – use Bulk Upload above</p>'}</div>
        `;
        container.appendChild(card);
      });
    }

    function renderEverything() {
      renderLeaderboard();
      renderDetailedRosters();
    }

    // ==================== BULK UPLOAD ====================
    function openBulkUploadModal() {
      document.getElementById('bulk-modal').classList.remove('hidden');
      document.getElementById('bulk-modal').classList.add('flex');
    }

    function hideBulkModal() {
      const modal = document.getElementById('bulk-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    function processBulkUpload() {
      const text = document.getElementById('bulk-textarea').value.trim();
      if (!text) return alert("Paste your data first");

      const lines = text.split('\n');
      const newTeams = createTeamsObj();

      lines.forEach(line => {
        const [team, ...playerParts] = line.split(',').map(s => s.trim());
        const player = playerParts.join(',').trim();
        if (teamNames.includes(team) && player) {
          if (!newTeams[team].includes(player)) newTeams[team].push(player);
        }
      });

      config.tournaments[config.currentTournamentKey].teams = newTeams;
      localStorage.setItem('fantasyGolfConfig', JSON.stringify(config));

      hideBulkModal();
      renderEverything();
      alert("✅ Rosters updated from Google Sheet!");
    }

    // Manual refresh
    function manualRefresh() {
      loadCurrentTournamentData().then(() => renderEverything());
    }

    // ==================== INIT ====================
    async function init() {
      await loadCurrentTournamentData();
      renderEverything();
      startRefreshCycle();
      console.log("%c✅ Phil's Fantasy Golf League – 2026 Masters • 3-min refresh (7AM–8PM ET) • Fuzzy name matching enabled", "color:#d4af77; font-weight:700");
    }

    window.onload = init;
  </script>
</body>
</html>
