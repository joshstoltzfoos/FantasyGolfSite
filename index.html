<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phil's Fantasy Golf | 2026 Masters</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(rgba(10, 61, 42, 0.9), rgba(10, 61, 42, 0.95)), url('https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Amen_Corner_Augusta_National.jpg/1920px-Amen_Corner_Augusta_National.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    .rank-1 { color: #d4af77; }
    .under-par { color: #ef4444 !important; font-weight: 700; }
  </style>
</head>
<body class="text-white min-h-screen pb-12">
  <div class="max-w-6xl mx-auto p-4 md:p-6">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
      <div class="flex items-center gap-4">
        <div class="bg-[#d4af77] p-3 rounded-2xl shadow-xl">
            <i class="fa-solid fa-golf-ball-tee text-3xl text-[#0a3d2a]"></i>
        </div>
        <div>
          <h1 class="text-4xl font-black uppercase tracking-tighter">Phil's Fantasy Golf League</h1>
          <div class="flex items-center gap-2 mt-1">
             <p class="text-green-300 text-sm font-bold tracking-widest uppercase">2026 Masters Tournament</p>
             <span id="api-status" class="text-[10px] px-2 py-0.5 rounded-full bg-yellow-500/20 text-yellow-400 border border-yellow-500/50 uppercase font-bold">Loading...</span>
          </div>
          <div id="last-updated" class="text-[10px] text-white/50 mt-1"></div>
        </div>
      </div>
      <button onclick="manualRefresh()" class="bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl px-6 py-3 transition-all active:scale-95 font-bold text-xs uppercase tracking-widest">
        <i class="fa-solid fa-arrows-rotate mr-2"></i>Force Refresh
      </button>
    </div>

    <div id="debug-box" class="hidden mb-8 p-4 bg-red-900/40 border border-red-500/50 rounded-2xl">
        <h3 class="text-xs font-bold uppercase mb-2 text-red-300"><i class="fa-solid fa-circle-exclamation mr-2"></i>API Troubleshooting:</h3>
        <p id="debug-text" class="text-sm font-mono text-red-200"></p>
    </div>

    <div class="mb-12">
      <h2 class="text-2xl font-black uppercase tracking-tighter mb-4 ml-2">Standings</h2>
      <div class="bg-black/40 backdrop-blur-xl rounded-3xl p-1 shadow-2xl border border-white/10 overflow-hidden">
        <table class="w-full">
          <thead class="bg-white/5 text-green-300 uppercase text-[10px] tracking-[0.2em]">
            <tr>
              <th class="px-6 py-4 text-left w-16">Pos</th>
              <th class="px-6 py-4 text-left">Manager</th>
              <th class="px-6 py-4 text-right">Score</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
      </div>
    </div>

    <h2 class="text-2xl font-black uppercase tracking-tighter mb-6 ml-2">Roster Breakdown</h2>
    <div id="detailed-rosters" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
  </div>

  <script>
    const teamRosters = {
      "Christine": ["Aldrich Potgieter", "Justin Thomas", "Wyndham Clark", "Harris English", "Sepp Straka", "Alex Noren", "Min Woo Lee"],
      "Doug": ["Rasmus Neergaard-Petersen", "Nicolai Højgaard", "Marco Penge", "Scottie Scheffler", "Chris Gotterup", "Jon Rahm", "Ryan Fox"],
      "Gerald": ["Robert MacIntyre", "Tyrrell Hatton", "Cameron Young", "Jordan Spieth", "Ludvig Åberg", "Justin Rose", "Zach Johnson"],
      "Josh": ["Patrick Cantlay", "Keegan Bradley", "Brooks Koepka", "Cameron Smith", "Collin Morikawa", "Adam Scott", "Max Homa"],
      "Nick": ["Maverick McNealy", "Ryan Gerard", "Tommy Fleetwood", "Brian Harman", "Matt Fitzpatrick", "Harry Hall", "Sami Välimäki"],
      "Patrick": ["Jacob Bridgeman", "Jake Knapp", "Aaron Rai", "Bubba Watson", "Brandon Holtz", "Sungjae Im", "Fred Couples"],
      "Phil": ["Hideki Matsuyama", "Russell Henley", "Gary Woodland", "Kristoffer Reitan", "Michael Kim", "Nick Taylor", "Sam Burns"],
      "Ricky": ["Rasmus Højgaard", "Corey Conners", "Shane Lowry", "Xander Schauffele", "Viktor Hovland", "Matt McCarty", "Patrick Reed"],
      "Roger": ["Bryson DeChambeau", "Kurt Kitayama", "Akshay Bhatia", "Si Woo Kim", "Ben Griffin", "Daniel Berger", "J.J. Spaun"],
      "Wallace": ["Max Greyserman", "Dustin Johnson", "Sergio Garcia", "Nicolas Echavarria", "Andrew Novak", "Rory McIlroy", "Jason Day"]
    };

    const RAPIDAPI_KEY = "e055e4f6ddmsh5f6b17a6f1eb52dp19a93cjsncf505c7264e2";
    const RAPIDAPI_HOST = "live-golf-data.p.rapidapi.com";
    const TOURN_ID = "014";
    const YEAR = "2026";

    const TOURNAMENT_END_DATE = new Date('2026-04-13T00:00:00-04:00'); // April 13 Eastern (after final round)

    let currentLeaderboardData = null;
    let lastRefreshTime = 0;

    function isTournamentOver() {
      return Date.now() > TOURNAMENT_END_DATE.getTime();
    }

    function isWithinRefreshWindow() {
      if (isTournamentOver()) return false;
      const now = new Date();
      const hour = now.getHours(); // Local time of visitor — but we'll adjust for Eastern
      // Better: convert to Eastern Time
      const easternNow = new Date(now.toLocaleString("en-US", { timeZone: "America/New_York" }));
      const easternHour = easternNow.getHours();
      return easternHour >= 7 && easternHour < 20; // 7 AM – 8 PM Eastern
    }

    function shouldRefresh() {
      if (!isWithinRefreshWindow()) return false;
      const fiveMinutesAgo = Date.now() - 5 * 60 * 1000;
      return lastRefreshTime < fiveMinutesAgo;
    }

    function saveToCache(data) {
      const cache = {
        leaderboard: data,
        timestamp: Date.now()
      };
      localStorage.setItem('mastersLeaderboardCache', JSON.stringify(cache));
    }

    function loadFromCache() {
      const cached = localStorage.getItem('mastersLeaderboardCache');
      if (!cached) return null;
      const parsed = JSON.parse(cached);
      currentLeaderboardData = parsed.leaderboard;
      lastRefreshTime = parsed.timestamp;
      return parsed.leaderboard;
    }

    function updateLastUpdated() {
      const el = document.getElementById('last-updated');
      if (!lastRefreshTime) {
        el.textContent = '';
        return;
      }
      const date = new Date(lastRefreshTime);
      const timeStr = date.toLocaleTimeString('en-US', { 
        hour: 'numeric', 
        minute: '2-digit',
        timeZone: 'America/New_York',
        hour12: true 
      });
      el.textContent = `Last updated: ${timeStr} ET`;
    }

    async function loadCurrentTournamentData(force = false) {
      const statusEl = document.getElementById('api-status');
      const debugBox = document.getElementById('debug-box');
      const debugText = document.getElementById('debug-text');

      // Use cache first for instant load
      if (!force && currentLeaderboardData) {
        statusEl.textContent = "🟢 Cached";
        statusEl.className = "text-[10px] px-2 py-0.5 rounded-full bg-blue-500/20 text-blue-400 border border-blue-500/50 uppercase font-bold";
        renderEverything();
        updateLastUpdated();
        return;
      }

      if (!force && !shouldRefresh()) {
        statusEl.textContent = isTournamentOver() ? "🏁 Tournament Over" : "🟡 Waiting for window";
        statusEl.className = "text-[10px] px-2 py-0.5 rounded-full bg-amber-500/20 text-amber-400 border border-amber-500/50 uppercase font-bold";
        renderEverything();
        updateLastUpdated();
        return;
      }

      try {
        statusEl.textContent = "🔄 Syncing...";
        statusEl.className = "text-[10px] px-2 py-0.5 rounded-full bg-yellow-500/20 text-yellow-400 border border-yellow-500/50 uppercase font-bold";

        const url = `https://${RAPIDAPI_HOST}/leaderboard?year=${YEAR}&tournId=${TOURN_ID}&orgId=1`;
        const res = await fetch(url, {
          headers: {
            'x-rapidapi-key': RAPIDAPI_KEY,
            'x-rapidapi-host': RAPIDAPI_HOST
          }
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        if (data.message) throw new Error(data.message);

        if (data && data.leaderboardRows) {
          currentLeaderboardData = data.leaderboardRows;
          lastRefreshTime = Date.now();
          saveToCache(currentLeaderboardData);

          statusEl.textContent = "🟢 Live";
          statusEl.className = "text-[10px] px-2 py-0.5 rounded-full bg-green-500/20 text-green-400 border border-green-500/50 uppercase font-bold";
          debugBox.classList.add('hidden');
        } else {
          throw new Error("No leaderboard data returned");
        }
      } catch (e) {
        console.error(e);
        statusEl.textContent = "🔴 Error";
        statusEl.className = "text-[10px] px-2 py-0.5 rounded-full bg-red-500/20 text-red-400 border border-red-500/50 uppercase font-bold";
        debugBox.classList.remove('hidden');
        debugText.textContent = e.message || "Failed to fetch data";
      }

      renderEverything();
      updateLastUpdated();
    }

    // Rest of your helper functions (normalize, getPlayerScore, getCutLine, renderEverything) remain unchanged
    function normalize(str) {
      return (str || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\(a\)/i, '').replace(/[^a-z0-9 ]/g, "").trim();
    }

    function getPlayerScore(playerName) {
      const fallback = { totalToPar: 0, rounds: ["—","—","—","—"], thru: "TBD", teeTime: "—", isMC: false, isDefault: true };
      if (!currentLeaderboardData) return fallback;
     
      const target = normalize(playerName);
      const p = currentLeaderboardData.find(row => {
          const rowName = normalize(`${row.firstName} ${row.lastName}`);
          return rowName.includes(target) || target.includes(rowName);
      });
      if (!p) return fallback;

      let scoreVal = (p.total === "E" || p.total === "even") ? 0 : parseInt(p.total);
      if (isNaN(scoreVal)) scoreVal = 0;

      const rounds = ["—","—","—","—"];
      if (p.rounds) p.rounds.forEach(r => { rounds[r.roundId - 1] = r.scoreToPar; });

      return {
        totalToPar: scoreVal,
        rounds,
        thru: p.thru || "—",
        teeTime: p.teeTime || "—",
        isMC: ["cut", "wd", "dq"].includes((p.status || "").toLowerCase()),
        isDefault: false
      };
    }

    function getCutLine() {
      if (!currentLeaderboardData) return 0;
      const scores = currentLeaderboardData
        .filter(p => !["cut", "wd", "dq"].includes((p.status || "").toLowerCase()))
        .map(p => (p.total === "E" || p.total === "even") ? 0 : parseInt(p.total))
        .filter(s => !isNaN(s));
      return scores.length ? Math.max(...scores) : 0;
    }

    function renderEverything() {
      const cutLine = getCutLine();
      const standings = Object.keys(teamRosters).map(name => {
          const players = teamRosters[name].map(pName => {
              const s = getPlayerScore(pName);
              const adjusted = s.isMC ? cutLine : s.totalToPar;
              return { ...s, name: pName, adjusted };
          });
          players.sort((a,b) => a.adjusted - b.adjusted);
          const total = players.slice(0, 4).reduce((sum, p) => sum + p.adjusted, 0);
          return { name, total, players };
      }).sort((a,b) => a.total - b.total);

      // Leaderboard table
      document.getElementById('leaderboard-body').innerHTML = standings.map((team, i) => `
        <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
          <td class="px-6 py-5 font-black text-white/50">${i+1}</td>
          <td class="px-6 py-5 font-bold uppercase text-sm">${team.name}</td>
          <td class="px-6 py-5 text-right font-black text-2xl">${team.total > 0 ? '+'+team.total : (team.total === 0 ? 'E' : team.total)}</td>
        </tr>`).join('');

      // Detailed rosters
      document.getElementById('detailed-rosters').innerHTML = standings.map(team => `
        <div class="bg-white/5 backdrop-blur-md rounded-3xl p-6 border border-white/10">
          <div class="flex justify-between items-start mb-6">
            <h3 class="text-xl font-black uppercase tracking-tighter">${team.name}</h3>
            <div class="text-right">
              <div class="text-[9px] uppercase font-black text-green-300 tracking-widest">Total</div>
              <div class="text-4xl font-black">${team.total > 0 ? '+'+team.total : (team.total === 0 ? 'E' : team.total)}</div>
            </div>
          </div>
          <div class="space-y-2">
            ${team.players.map(p => `
              <div class="bg-black/20 rounded-xl px-4 py-3 flex items-center justify-between border border-white/5">
                <div>
                  <div class="text-xs font-black uppercase">${p.name} ${p.isMC ? '⛳' : ''}</div>
                  <div class="text-[10px] font-bold text-white/40 uppercase">${p.thru === "—" ? 'Tee: '+p.teeTime : 'Thru: '+p.thru}</div>
                </div>
                <div class="font-black text-lg ${p.isMC ? 'line-through text-red-500/50' : (p.adjusted < 0 ? 'under-par' : '')}">
                  ${p.adjusted > 0 ? '+'+p.adjusted : (p.adjusted === 0 && !p.isDefault ? 'E' : p.adjusted)}
                </div>
              </div>
            `).join('')}
          </div>
        </div>`).join('');
    }

    async function manualRefresh() {
      await loadCurrentTournamentData(true); // force = true
    }

    // Auto-refresh loop
    function startAutoRefresh() {
      setInterval(() => {
        if (shouldRefresh()) {
          loadCurrentTournamentData();
        }
      }, 30000); // Check every 30 seconds (cheap), but only fetch every 5 min
    }

    // Initial load
    window.onload = async () => {
      // Try cache first for instant display
      loadFromCache();
      renderEverything();
      updateLastUpdated();

      // Then do the first real load if needed
      await loadCurrentTournamentData();

      startAutoRefresh();
    };
  </script>
</body>
</html>
