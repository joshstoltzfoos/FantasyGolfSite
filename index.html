<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phil's Fantasy Golf League</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-image: linear-gradient(rgba(10, 61, 42, 0.88), rgba(10, 61, 42, 0.92)), url('https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Amen_Corner_Augusta_National.jpg/1920px-Amen_Corner_Augusta_National.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: translateY(-2px); }
    .rank-1 { color: #d4af77; } .rank-2 { color: #c0c0c0; } .rank-3 { color: #cd7f32; }
    .under-par { color: #ef4444 !important; font-weight: 600; }
  </style>
</head>
<body class="text-white min-h-screen">
  <div class="max-w-6xl mx-auto p-4 md:p-6">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-golf-ball text-5xl text-[#d4af77]"></i>
        <div>
          <h1 class="text-4xl font-bold tracking-tight">Phil's Fantasy Golf League</h1>
          <p class="text-green-300 text-sm">2026 Masters • Best 4 scores count • MC = worst made-cut score</p>
        </div>
      </div>
      <button onclick="manualRefresh()" 
              class="flex items-center justify-center w-10 h-10 bg-white/10 hover:bg-white/20 border border-white/30 rounded-3xl text-[#d4af77]">
        <i class="fa-solid fa-rotate"></i>
      </button>
    </div>

    <div id="last-updated" class="text-sm text-green-300 font-medium mb-8 text-right"></div>

    <!-- Leaderboard -->
    <div class="mb-12">
      <h2 class="text-3xl font-semibold mb-4">Leaderboard</h2>
      <div class="card bg-white/10 backdrop-blur-xl rounded-3xl p-1 shadow-2xl overflow-hidden">
        <table class="w-full bg-transparent rounded-3xl">
          <thead class="bg-gradient-to-r from-green-800 to-[#0a3d2a]">
            <tr>
              <th class="px-6 py-5 text-left font-medium w-16">Rank</th>
              <th class="px-6 py-5 text-left font-medium">Team</th>
              <th class="px-6 py-5 text-right font-medium">Score (best 4)</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body" class="text-xl"></tbody>
        </table>
      </div>
    </div>

    <!-- Detailed Rosters -->
    <div>
      <h2 class="text-3xl font-semibold mb-4">Detailed Team Rosters</h2>
      <div id="detailed-rosters" class="space-y-8"></div>
    </div>
  </div>

  <script>
    // ==================== YOUR EXACT ROSTERS ====================
    const teamRosters = {
      "Christine": ["Aldrich Potgieter", "Justin Thomas", "Wyndham Clark", "Harris English", "Sepp Straka", "Alex Noren", "Min Woo Lee"],
      "Doug": ["Rasmus Neergaard-Petersen", "Nicolai Højgaard", "Marco Penge", "Scottie Scheffler", "Chris Gotterup", "Jon Rahm", "Ryan Fox"],
      "Gerald": ["Robert MacIntyre", "Tyrrell Hatton", "Cameron Young", "Jordan Spieth", "Ludvig Åberg", "Justin Rose", "Zach Johnson"],
      "Josh": ["Patrick Cantlay", "Keegan Bradley", "Brooks Koepka", "Cameron Smith", "Collin Morikawa", "Adam Scott", "Max Homa"],
      "Nick": ["Maverick McNealy", "Ryan Gerard", "Tommy Fleetwood", "Brian Harman", "Matt Fitzpatrick", "Harry Hall", "Sami Välimäki"],
      "Patrick": ["Jacob Bridgeman", "Jake Knapp", "Aaron Rai", "Bubba Watson", "Brandon Holtz", "Sungjae Im", "Fred Couples"],
      "Phil": ["Hideki Matsuyama", "Russell Henley", "Gary Woodland", "Kristoffer Reitan", "Michael Kim", "Nick Taylor", "Sam Burns"],
      "Ricky": ["Rasmus Højgaard", "Corey Conners", "Shane Lowry", "Xander Schauffele", "Viktor Hovland", "Matt McCarty", "Patrick Reed"],
      "Roger": ["Bryson DeChambeau", "Kurt Kitayama", "Akshay Bhatia", "Si Woo Kim", "Ben Griffin", "Daniel Berger", "J.J. Spaun"],
      "Wallace": ["Max Greyserman", "Dustin Johnson", "Sergio Garcia", "Nico Echavarria", "Andrew Novak", "Rory McIlroy", "Jason Day"]
    };

    const teamNames = Object.keys(teamRosters);

    let currentLeaderboardData = null;
    let isTournamentOver = false;
    let refreshInterval = null;

    const RAPIDAPI_KEY = "e055e416ddmsh5f6b17a6f1eb52dp19a93cjsncf505c7264e2";
    const RAPIDAPI_HOST = "live-golf-data.p.rapidapi.com";

    // ==================== REFRESH LOGIC (3 min, 7AM–8PM ET) ====================
    function isRefreshWindow() {
      const hour = parseInt(new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/New_York',
        hour: 'numeric',
        hour12: false
      }).format(new Date()), 10);
      return hour >= 7 && hour < 20;
    }

    async function fetchRapidAPI(endpoint, params) {
      const url = new URL(`https://${RAPIDAPI_HOST}${endpoint}`);
      Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));
      try {
        const res = await fetch(url, {
          headers: {
            'x-rapidapi-key': RAPIDAPI_KEY,
            'x-rapidapi-host': RAPIDAPI_HOST
          }
        });
        return res.ok ? await res.json() : null;
      } catch (e) {
        console.error("API error");
        return null;
      }
    }

    async function loadCurrentTournamentData() {
      if (isTournamentOver) return;
      const data = await fetchRapidAPI('/leaderboard', { year: "2026", tournId: "536" });
      if (data) currentLeaderboardData = data;
      updateLastUpdated();
    }

    function updateLastUpdated() {
      const el = document.getElementById('last-updated');
      const time = new Date().toLocaleTimeString('en-US', {
        timeZone: 'America/New_York',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      });
      el.textContent = `Last updated: ${time} ET`;
    }

    function startRefreshCycle() {
      if (refreshInterval) clearInterval(refreshInterval);
      refreshInterval = setInterval(() => {
        if (!isTournamentOver && isRefreshWindow()) {
          loadCurrentTournamentData().then(renderEverything);
        }
      }, 180000); // 3 minutes
    }

    // ==================== FUZZY NAME MATCHING ====================
    function normalize(str) {
      return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
    }

    function findPlayer(desiredName, rows) {
      if (!rows) return null;
      const norm = normalize(desiredName);
      for (let p of rows) {
        const full = normalize(`${p.firstName || ''} ${p.lastName || ''}`);
        if (full === norm || full.includes(norm) || norm.includes(full)) return p;
      }
      return null;
    }

    function getPlayerScore(playerName) {
      if (!currentLeaderboardData?.leaderboardRows) {
        return {totalToPar: 999, rounds: ["—","—","—","—"], thru: "—", teeTime: "—", isMC: true};
      }

      const p = findPlayer(playerName, currentLeaderboardData.leaderboardRows);
      if (!p) return {totalToPar: 999, rounds: ["—","—","—","—"], thru: "—", teeTime: "—", isMC: true};

      let totalToPar = p.total === "E" ? 0 : parseInt(p.total) || 0;
      const rounds = Array(4).fill("—");
      (p.rounds || []).forEach(r => {
        const idx = (r.roundId || 1) - 1;
        if (idx >= 0 && idx < 4) rounds[idx] = r.scoreToPar === "E" ? "E" : (parseInt(r.scoreToPar) || 0);
      });

      const isMC = ["cut", "wd", "dq"].includes((p.status || "").toLowerCase());
      return {
        totalToPar,
        rounds,
        thru: p.thru || "—",
        teeTime: p.teeTime || "—",
        isMC
      };
    }

    function getCutLine() {
      if (!currentLeaderboardData) return 999;
      const madeCut = currentLeaderboardData.leaderboardRows
        .map(p => {
          const s = getPlayerScore(`${p.firstName} ${p.lastName}`);
          return s.isMC ? null : s.totalToPar;
        })
        .filter(s => s !== null);
      return madeCut.length ? Math.max(...madeCut) : 999;
    }

    function calculateTeamScore(teamName) {
      const roster = teamRosters[teamName] || [];
      if (!roster.length || !currentLeaderboardData) return {score: 999, players: []};

      const cutLine = getCutLine();
      const playerScores = roster.map(name => {
        const scoreObj = getPlayerScore(name);
        const adjusted = scoreObj.isMC ? cutLine : scoreObj.totalToPar;
        return { ...scoreObj, name, adjusted };
      });

      playerScores.sort((a, b) => a.adjusted - b.adjusted);
      const best4Total = playerScores.slice(0, 4).reduce((sum, p) => sum + p.adjusted, 0);

      return { score: best4Total, players: playerScores };
    }

    // ==================== RENDERING ====================
    function renderLeaderboard() {
      const tbody = document.getElementById('leaderboard-body');
      tbody.innerHTML = '';

      const sorted = teamNames.map(name => {
        const res = calculateTeamScore(name);
        return { name, score: res.score };
      }).sort((a, b) => a.score - b.score);

      sorted.forEach((team, i) => {
        const rankHTML = i === 0 ? `<span class="rank-1">1</span>` : i === 1 ? `<span class="rank-2">2</span>` : i === 2 ? `<span class="rank-3">3</span>` : i + 1;
        const scoreDisplay = team.score === 999 ? '—' : (team.score > 0 ? `+${team.score}` : team.score);
        const row = document.createElement('tr');
        row.className = "border-b border-white/10 last:border-none hover:bg-white/5";
        row.innerHTML = `
          <td class="px-6 py-5 font-semibold">${rankHTML}</td>
          <td class="px-6 py-5 font-medium">${team.name}</td>
          <td class="px-6 py-5 text-right font-semibold">${scoreDisplay}</td>
        `;
        tbody.appendChild(row);
      });
    }

    function renderDetailedRosters() {
      const container = document.getElementById('detailed-rosters');
      container.innerHTML = '';

      teamNames.forEach(teamName => {
        const result = calculateTeamScore(teamName);
        let playersHTML = '';

        result.players.forEach(p => {
          const scoreClass = p.isMC ? 'line-through text-red-400' : (p.adjusted < 0 ? 'under-par' : '');
          const mcTag = p.isMC ? ' <span class="text-xs bg-red-500/70 px-2 py-0.5 rounded">MC</span>' : '';
          const status = (p.teeTime && p.thru === "—") ? 
            `<span class="text-amber-300">Tee: ${p.teeTime}</span>` : 
            `Thru: ${p.thru}`;

          playersHTML += `
            <div class="flex flex-col sm:flex-row gap-4 bg-white/5 rounded-3xl px-6 py-4 items-center">
              <div class="font-medium flex-1">${p.name}</div>
              <div class="text-sm text-white/70">${status}</div>
              <div class="flex gap-4 text-xs">
                ${p.rounds.map((r,i) => `<div class="text-center"><span class="block text-white/50">R${i+1}</span>${r}</div>`).join('')}
              </div>
              <div class="font-semibold text-lg ${scoreClass}">${p.adjusted > 0 ? '+' : ''}${p.adjusted}${mcTag}</div>
            </div>`;
        });

        const card = document.createElement('div');
        card.className = "card bg-white/10 backdrop-blur-xl rounded-3xl p-6";
        card.innerHTML = `
          <div class="flex justify-between mb-5">
            <h3 class="text-2xl font-semibold">${teamName}</h3>
            <div class="text-right">
              <div class="text-sm text-green-300">Best 4 total</div>
              <div class="text-4xl font-bold">${result.score === 999 ? '—' : (result.score > 0 ? `+${result.score}` : result.score)}</div>
            </div>
          </div>
          <div class="space-y-2">${playersHTML}</div>
        `;
        container.appendChild(card);
      });
    }

    function renderEverything() {
      renderLeaderboard();
      renderDetailedRosters();
    }

    function manualRefresh() {
      loadCurrentTournamentData().then(renderEverything);
    }

    // ==================== INIT ====================
    async function init() {
      await loadCurrentTournamentData();
      renderEverything();
      startRefreshCycle();
      console.log("%c✅ Phil's Fantasy Golf League – Rosters loaded • 3-min refresh active", "color:#d4af77; font-weight:700");
    }

    window.onload = init;
  </script>
</body>
</html>
