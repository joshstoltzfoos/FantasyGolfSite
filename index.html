<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phil's Fantasy Golf League</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; background-image: linear-gradient(rgba(10, 61, 42, 0.88), rgba(10, 61, 42, 0.92)), url('https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Amen_Corner_Augusta_National.jpg/1920px-Amen_Corner_Augusta_National.jpg'); background-size: cover; background-position: center; background-attachment: fixed; }
    .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.2), 0 8px 10px -6px rgb(0 0 0 / 0.2); }
    .leaderboard-table tr:hover { background-color: #f3f4f6; }
    .rank-1 { color: #d4af77; } .rank-2 { color: #c0c0c0; } .rank-3 { color: #cd7f32; }
    .under-par { color: #ef4444 !important; font-weight: 600; }
    .gear-menu { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="text-white min-h-screen">
  <div class="max-w-6xl mx-auto p-4">
    <!-- Header (unchanged) -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-golf-ball text-5xl text-[#d4af77]"></i>
        <div>
          <h1 class="text-4xl font-bold tracking-tight">Phil's Fantasy Golf League</h1>
          <p class="text-green-300 text-sm -mt-1">Live Leaderboard</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <select id="tournament-select" onchange="switchTournament(this.value)" class="bg-white/10 border border-white/30 rounded-3xl px-6 py-3 text-white font-medium focus:outline-none focus:border-[#d4af77] shadow-inner"></select>
      </div>
      <div class="relative">
        <button onclick="toggleGearMenu()" class="flex items-center justify-center w-12 h-12 bg-white/10 hover:bg-white/20 border border-white/30 rounded-3xl text-[#d4af77] hover:text-amber-300 transition-colors focus:outline-none">
          <i class="fa-solid fa-gear text-3xl"></i>
        </button>
        <div id="gear-menu" class="hidden gear-menu absolute right-0 mt-3 w-72 bg-[#0a3d2a] border border-[#d4af77] rounded-3xl shadow-2xl py-2 z-50 text-white">
          <!-- Gear content remains exactly as you had it -->
          <div class="px-6 py-3 border-b border-white/20">
            <p class="text-xs uppercase tracking-widest text-green-300 mb-1">Current Tournament</p>
            <select id="gear-tournament-select" onchange="setCurrentFromGear(this.value)" class="w-full bg-white/10 border border-white/30 rounded-3xl px-4 py-3 text-white font-medium focus:outline-none focus:border-[#d4af77]"></select>
          </div>
          <div class="px-2 py-1">
            <button onclick="openManageRostersModal()" class="w-full flex items-center gap-3 px-6 py-4 hover:bg-white/10 rounded-3xl text-left text-lg font-medium"><i class="fa-solid fa-users w-5"></i><span>Manage Rosters</span></button>
            <button onclick="openManageTournamentsModal()" class="w-full flex items-center gap-3 px-6 py-4 hover:bg-white/10 rounded-3xl text-left text-lg font-medium"><i class="fa-solid fa-trophy w-5"></i><span>Manage Tournaments</span></button>
            <button onclick="fetchAndShowSchedule()" class="w-full flex items-center gap-3 px-6 py-4 hover:bg-white/10 rounded-3xl text-left text-lg font-medium"><i class="fa-solid fa-calendar w-5"></i><span>Fetch PGA Schedule (get tournIds)</span></button>
            <button onclick="showAddTournamentModal()" class="w-full flex items-center gap-3 px-6 py-4 hover:bg-white/10 rounded-3xl text-left text-lg font-medium border-t border-white/10 mt-2 pt-4"><i class="fa-solid fa-plus w-5"></i><span>Add New Tournament</span></button>
          </div>
          <div class="px-6 pt-4 border-t border-white/20 text-xs text-green-300 flex justify-between items-center">
            <span>Admin • Only visible to you</span>
            <button onclick="toggleGearMenu()" class="text-[#d4af77] hover:text-amber-300">Close</button>
          </div>
        </div>
      </div>
    </div>

    <div id="last-updated" class="text-sm text-green-300 font-medium mb-8 text-right"></div>

    <!-- Rest of your HTML (Leaderboard, Detailed Rosters, League Stats, Modals) remains unchanged -->
    <!-- ... paste the rest of your original HTML here ... -->

  </div>

  <script>
    // ==================== CONFIG ====================
    const teamNames = ["Gerald", "Josh", "Phil", "Patrick", "Wallace", "Ricky", "Roger", "Graham", "Doug", "Nick"];
    const createTeamsObj = () => { const obj = {}; teamNames.forEach(n => obj[n] = []); return obj; };

    const defaultConfig = {
      tournaments: {
        "2026-masters": { name: "2026 Masters", year: "2026", tournId: "TODO-get-from-schedule", teams: createTeamsObj() },
        // ... your other tournaments exactly as before
        "2025-masters": { name: "2025 Masters", year: "2025", tournId: "TODO-get-from-schedule", teams: createTeamsObj() },
        "2025-pga-championship": { name: "2025 PGA Championship", year: "2025", tournId: "TODO-get-from-schedule", teams: createTeamsObj() },
        "2025-us-open": { name: "2025 U.S. Open", year: "2025", tournId: "TODO-get-from-schedule", teams: createTeamsObj() },
        "2025-the-open": { name: "2025 The Open Championship", year: "2025", tournId: "TODO-get-from-schedule", teams: createTeamsObj() },
        "2024-masters": { name: "2024 Masters", year: "2024", tournId: "TODO-get-from-schedule", teams: createTeamsObj() },
        "2024-valspar": { name: "2024 Valspar Championship", year: "2024", tournId: "475", teams: createTeamsObj() }
        // add the rest as needed
      },
      currentTournamentKey: "2026-masters"
    };

    let config = JSON.parse(localStorage.getItem('fantasyGolfConfig')) || defaultConfig;
    if (!localStorage.getItem('fantasyGolfConfig')) localStorage.setItem('fantasyGolfConfig', JSON.stringify(config));

    let currentLeaderboardData = null;
    let dataCache = {};
    let isTournamentOver = false;
    let refreshInterval = null;

    const RAPIDAPI_KEY = "e055e416ddmsh5f6b17a6f1eb52dp19a93cjsncf505c7264e2";
    const RAPIDAPI_HOST = "live-golf-data.p.rapidapi.com";

    // Helper: Is it currently 7AM–8PM Eastern?
    function isRefreshWindow() {
      const now = new Date();
      const et = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/New_York',
        hour: 'numeric',
        hour12: false
      }).format(now);
      const hour = parseInt(et, 10);
      return hour >= 7 && hour < 20; // 7:00 AM to 7:59 PM ET (stops before 8PM)
    }

    async function fetchRapidAPI(endpoint, params = {}) {
      const url = new URL(`https://${RAPIDAPI_HOST}${endpoint}`);
      Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));

      try {
        const res = await fetch(url, {
          headers: {
            'x-rapidapi-key': RAPIDAPI_KEY,
            'x-rapidapi-host': RAPIDAPI_HOST
          }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } catch (e) {
        console.error("🚨 RapidAPI fetch failed", e);
        return null;
      }
    }

    async function fetchForTournament(key) {
      if (dataCache[key]) return dataCache[key];

      const tour = config.tournaments[key];
      if (!tour?.year || !tour?.tournId || tour.tournId === "TODO-get-from-schedule") {
        console.warn("Missing year or tournId for", key);
        return null;
      }

      const data = await fetchRapidAPI('/leaderboard', { year: tour.year, tournId: tour.tournId });
      if (data) dataCache[key] = data;
      return data;
    }

    // Determine if tournament is finished
    function isTournamentCompleted(data) {
      if (!data || !data.leaderboardRows || data.leaderboardRows.length === 0) return false;

      const rows = data.leaderboardRows;
      // Common completion signals from golf APIs
      const finishedStatuses = new Set(["F", "cut", "wd", "dq", "finished"]);

      let allFinished = true;
      for (const p of rows) {
        const status = (p.status || p.thru || "").toString().toLowerCase().trim();
        if (!finishedStatuses.has(status) && status !== "-" && status !== "f" && !status.includes("finished")) {
          allFinished = false;
          break;
        }
      }

      // Extra check: if there's a clear leader and round 4 is complete for top players
      const hasWinner = rows[0] && (rows[0].total || rows[0].position);
      return allFinished || (hasWinner && rows.every(p => (p.rounds || []).length >= 4));
    }

    async function loadCurrentTournamentData() {
      if (isTournamentOver) return; // Stop calling once over

      const key = config.currentTournamentKey;
      const data = await fetchForTournament(key);

      if (data) {
        currentLeaderboardData = data;
        isTournamentOver = isTournamentCompleted(data);

        if (isTournamentOver) {
          console.log("%c🏁 Tournament detected as finished – stopping automatic refreshes", "color:#d4af77;font-weight:700");
          clearInterval(refreshInterval);
          refreshInterval = null;
        }
      }

      updateLastUpdated();
      return data;
    }

    function updateLastUpdated() {
      const el = document.getElementById('last-updated');
      const now = new Date();
      const etTime = now.toLocaleTimeString('en-US', { 
        timeZone: 'America/New_York',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true 
      });
      const status = isTournamentOver ? ' – Tournament Complete (refreshes stopped)' : '';
      el.textContent = `Last updated: ${etTime} ET${status}`;
    }

    function renderEverything() {
      // Call your existing renderLeaderboard(), renderDetailedRosters(), renderLeagueStats(), updateTournamentStatusBadge(), etc.
      // (These functions are unchanged from your original code)
      renderLeaderboard();
      renderDetailedRosters();
      renderLeagueStats();
      updateTournamentStatusBadge();
    }

    // ==================== Refresh Management ====================
    function startRefreshCycle() {
      if (refreshInterval) clearInterval(refreshInterval);

      refreshInterval = setInterval(() => {
        if (isTournamentOver) {
          clearInterval(refreshInterval);
          return;
        }
        if (isRefreshWindow()) {
          loadCurrentTournamentData().then(() => renderEverything());
        }
      }, 180000); // 3 minutes
    }

    // Initial load + start smart refreshes
    async function init() {
      populateTournamentSelector();
      populateGearTournamentSelect();

      await loadCurrentTournamentData();
      renderEverything();

      startRefreshCycle();

      console.log("%c✅ Phil's Fantasy Golf League – Smart Refresh Active (3 min during 7AM–8PM ET)", "color:#d4af77; font-weight:700");
    }

    // When switching tournaments, reset over flag and restart cycle
    function switchTournament(newKey) {
      config.currentTournamentKey = newKey;
      localStorage.setItem('fantasyGolfConfig', JSON.stringify(config));
      isTournamentOver = false;
      currentLeaderboardData = null;
      dataCache = {}; // optional: clear cache on switch
      loadCurrentTournamentData().then(() => renderEverything());
      startRefreshCycle(); // restart with new tournament
    }

    // Keep your other functions (fetchAndShowSchedule, getPlayerScore, render functions, modals, etc.) exactly as they were.

    window.onload = init; // or call init() directly if you prefer
  </script>
</body>
</html>
