<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phil's Fantasy Golf League</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; background-image: linear-gradient(rgba(10, 61, 42, 0.88), rgba(10, 61, 42, 0.92)), url('https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Amen_Corner_Augusta_National.jpg/1920px-Amen_Corner_Augusta_National.jpg'); background-size: cover; background-position: center; background-attachment: fixed; }
    .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.2), 0 8px 10px -6px rgb(0 0 0 / 0.2); }
    .leaderboard-table tr:hover { background-color: #f3f4f6; }
    .rank-1 { color: #d4af77; } .rank-2 { color: #c0c0c0; } .rank-3 { color: #cd7f32; }
    .under-par { color: #ef4444 !important; font-weight: 600; }
    .gear-menu { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .modal { animation: modalPop 0.3s ease-out forwards; }
    @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="text-white min-h-screen">
  <div class="max-w-6xl mx-auto p-4">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-golf-ball text-5xl text-[#d4af77]"></i>
        <div>
          <h1 class="text-4xl font-bold tracking-tight">Phil's Fantasy Golf League</h1>
          <p class="text-green-300 text-sm -mt-1">Live Leaderboard • Best 4 scores count • MC = worst made-cut score</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <select id="tournament-select" onchange="switchTournament(this.value)" class="bg-white/10 border border-white/30 rounded-3xl px-6 py-3 text-white font-medium focus:outline-none focus:border-[#d4af77] shadow-inner"></select>
      </div>
      <div class="relative">
        <button onclick="toggleGearMenu()" class="flex items-center justify-center w-12 h-12 bg-white/10 hover:bg-white/20 border border-white/30 rounded-3xl text-[#d4af77] hover:text-amber-300 transition-colors focus:outline-none">
          <i class="fa-solid fa-gear text-3xl"></i>
        </button>
        <div id="gear-menu" class="hidden gear-menu absolute right-0 mt-3 w-72 bg-[#0a3d2a] border border-[#d4af77] rounded-3xl shadow-2xl py-2 z-50 text-white">
          <div class="px-6 py-3 border-b border-white/20">
            <p class="text-xs uppercase tracking-widest text-green-300 mb-1">Current Tournament</p>
            <select id="gear-tournament-select" onchange="setCurrentFromGear(this.value)" class="w-full bg-white/10 border border-white/30 rounded-3xl px-4 py-3 text-white font-medium focus:outline-none focus:border-[#d4af77]"></select>
          </div>
          <div class="px-2 py-1">
            <button onclick="openManageRostersModal()" class="w-full flex items-center gap-3 px-6 py-4 hover:bg-white/10 rounded-3xl text-left text-lg font-medium"><i class="fa-solid fa-users w-5"></i><span>Manage Rosters</span></button>
            <button onclick="openManageTournamentsModal()" class="w-full flex items-center gap-3 px-6 py-4 hover:bg-white/10 rounded-3xl text-left text-lg font-medium"><i class="fa-solid fa-trophy w-5"></i><span>Manage Tournaments</span></button>
            <button onclick="fetchAndShowSchedule()" class="w-full flex items-center gap-3 px-6 py-4 hover:bg-white/10 rounded-3xl text-left text-lg font-medium"><i class="fa-solid fa-calendar w-5"></i><span>Fetch PGA Schedule (get tournIds)</span></button>
            <button onclick="showAddTournamentModal()" class="w-full flex items-center gap-3 px-6 py-4 hover:bg-white/10 rounded-3xl text-left text-lg font-medium border-t border-white/10 mt-2 pt-4"><i class="fa-solid fa-plus w-5"></i><span>Add New Tournament</span></button>
          </div>
          <div class="px-6 pt-4 border-t border-white/20 text-xs text-green-300 flex justify-between items-center">
            <span>Admin • Only visible to you</span>
            <button onclick="toggleGearMenu()" class="text-[#d4af77] hover:text-amber-300">Close</button>
          </div>
        </div>
      </div>
    </div>

    <div id="last-updated" class="text-sm text-green-300 font-medium mb-8 text-right"></div>

    <!-- Leaderboard -->
    <div class="mb-12">
      <div class="flex items-baseline justify-between mb-4">
        <h2 class="text-3xl font-semibold flex items-center gap-2"><span>Leaderboard</span><span id="tournament-status-badge" class="text-sm px-3 py-1 rounded-3xl bg-white/10 text-green-300 font-medium"></span></h2>
      </div>
      <div class="card bg-white/10 backdrop-blur-xl rounded-3xl p-1 shadow-2xl">
        <table class="w-full leaderboard-table bg-transparent rounded-3xl overflow-hidden">
          <thead class="bg-gradient-to-r from-green-800 to-[#0a3d2a]"><tr><th class="px-8 py-5 text-left font-medium">Rank</th><th class="px-8 py-5 text-left font-medium">Team</th><th class="px-8 py-5 text-right font-medium">Score (best 4)</th></tr></thead>
          <tbody id="leaderboard-body" class="text-xl"></tbody>
        </table>
      </div>
    </div>

    <!-- Detailed Team Rosters -->
    <div class="mb-12">
      <h2 class="text-3xl font-semibold mb-4">Detailed Team Rosters</h2>
      <div id="detailed-rosters" class="space-y-8"></div>
    </div>

    <!-- League Stats -->
    <div>
      <h2 class="text-3xl font-semibold mb-4 flex items-center gap-2">League Stats <span class="text-sm font-medium text-green-300 px-3 py-1 bg-white/10 rounded-3xl">All-Time • Since 2020</span></h2>
      <div id="league-stats" class="card bg-white/10 backdrop-blur-xl rounded-3xl p-8 shadow-2xl text-white"></div>
    </div>
  </div>

  <!-- Add Tournament Modal -->
  <div id="add-modal" onclick="if(event.target===this)hideAddModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div onclick="event.stopImmediatePropagation()" class="modal card bg-[#0a3d2a] border border-[#d4af77] rounded-3xl p-8 w-full max-w-lg mx-4">
      <h3 class="text-3xl font-bold mb-8">Create New Tournament</h3>
      <input id="new-name" placeholder="Tournament Name (e.g. 2026 Masters)" class="w-full bg-white/10 border border-white/30 rounded-3xl px-6 py-4 mb-6 text-white placeholder:text-white/60">
      <div class="grid grid-cols-2 gap-4 mb-6">
        <div>
          <label class="block text-sm mb-2 font-medium">Year</label>
          <input id="new-year" type="text" value="2026" class="w-full bg-white/10 border border-white/30 rounded-3xl px-6 py-4 text-white">
        </div>
        <div>
          <label class="block text-sm mb-2 font-medium">tournId (from Schedule)</label>
          <input id="new-tournid" placeholder="e.g. 536" class="w-full bg-white/10 border border-white/30 rounded-3xl px-6 py-4 text-white">
        </div>
      </div>
      <label class="block text-sm mb-3 font-medium">League Participants (one name per line)</label>
      <textarea id="new-teams" rows="6" placeholder="Gerald&#10;Josh&#10;Phil&#10;Patrick&#10;Wallace&#10;Ricky&#10;Roger&#10;Graham&#10;Doug&#10;Nick" class="w-full bg-white/10 border border-white/30 rounded-3xl px-6 py-4 text-white resize-none"></textarea>
      <div class="flex gap-4 mt-8">
        <button onclick="hideAddModal()" class="flex-1 py-4 rounded-3xl border border-white/30 font-medium">Cancel</button>
        <button onclick="addNewTournament()" class="flex-1 py-4 bg-[#d4af77] hover:bg-amber-300 text-[#0a3d2a] rounded-3xl font-semibold">Create Tournament</button>
      </div>
    </div>
  </div>

  <!-- Manage Rosters Modal -->
  <div id="rosters-modal" onclick="if(event.target===this)hideManageRostersModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div onclick="event.stopImmediatePropagation()" class="modal card bg-[#0a3d2a] border border-[#d4af77] rounded-3xl p-8 w-full max-w-2xl mx-4">
      <h3 class="text-3xl font-bold mb-6">Manage Rosters</h3>
      <div class="mb-6">
        <label class="block text-sm mb-2 font-medium">Select Team</label>
        <select id="modal-team-select" onchange="loadTeamRosterForModal()" class="w-full bg-white/10 border border-white/30 rounded-3xl px-6 py-4 text-white"></select>
      </div>
      <div class="mb-6">
        <label class="block text-sm mb-3 font-medium">Current Players</label>
        <div id="modal-roster-list" class="max-h-64 overflow-auto bg-white/5 rounded-3xl p-4 space-y-2"></div>
      </div>
      <div class="flex gap-3">
        <input id="new-player-name" placeholder="Add player (e.g. Scottie Scheffler)" class="flex-1 bg-white/10 border border-white/30 rounded-3xl px-6 py-4 text-white">
        <button onclick="addPlayerToCurrentTeam()" class="px-8 bg-[#d4af77] hover:bg-amber-300 text-[#0a3d2a] rounded-3xl font-semibold">Add</button>
      </div>
      <div class="flex gap-4 mt-8">
        <button onclick="hideManageRostersModal()" class="flex-1 py-4 rounded-3xl border border-white/30 font-medium">Close</button>
        <button onclick="saveRostersFromModal()" class="flex-1 py-4 bg-[#d4af77] hover:bg-amber-300 text-[#0a3d2a] rounded-3xl font-semibold">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Manage Tournaments Modal -->
  <div id="tournaments-modal" onclick="if(event.target===this)hideManageTournamentsModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div onclick="event.stopImmediatePropagation()" class="modal card bg-[#0a3d2a] border border-[#d4af77] rounded-3xl p-8 w-full max-w-2xl mx-4">
      <h3 class="text-3xl font-bold mb-6">Manage Tournaments</h3>
      <div id="modal-tournaments-list" class="max-h-96 overflow-auto space-y-3"></div>
      <div class="flex gap-4 mt-8">
        <button onclick="hideManageTournamentsModal()" class="flex-1 py-4 rounded-3xl border border-white/30 font-medium">Close</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== CONFIG & STATE ====================
    const teamNames = ["Gerald", "Josh", "Phil", "Patrick", "Wallace", "Ricky", "Roger", "Graham", "Doug", "Nick"];
    const createTeamsObj = () => {
      const obj = {};
      teamNames.forEach(n => obj[n] = []);
      return obj;
    };

    let defaultConfig = {
      tournaments: {
        "2026-masters": {
          name: "2026 Masters",
          year: "2026",
          tournId: "536",
          teams: {
            "Gerald": ["Scottie Scheffler", "Rory McIlroy", "Xander Schauffele", "Collin Morikawa", "Ludvig Åberg", "Hideki Matsuyama"],
            "Josh": ["Jon Rahm", "Bryson DeChambeau", "Viktor Hovland", "Cameron Smith", "Jordan Spieth", "Patrick Cantlay"],
            "Phil": ["Justin Thomas", "Brooks Koepka", "Dustin Johnson", "Tommy Fleetwood", "Tyrrell Hatton", "Shane Lowry"],
            "Patrick": ["Will Zalatoris", "Tony Finau", "Sungjae Im", "Max Homa", "Matt Fitzpatrick", "Tom Kim"],
            "Wallace": ["Wyndham Clark", "Jason Day", "Sahith Theegala", "Corey Conners", "Keegan Bradley", "Si Woo Kim"],
            "Ricky": ["Rickie Fowler", "Justin Rose", "Adam Scott", "Bubba Watson", "Charley Hoffman", "Fred Couples"],
            "Roger": ["Tiger Woods", "Sergio Garcia", "Henrik Stenson", "Bernhard Langer", "José María Olazábal", "Phil Mickelson"],
            "Graham": ["Brian Harman", "Cam Young", "Aaron Rai", "Min Woo Lee", "Akshay Bhatia", "J.T. Poston"],
            "Doug": ["Sam Burns", "Russell Henley", "Sepp Straka", "Nick Taylor", "Mackenzie Hughes", "Adam Hadwin"],
            "Nick": ["Davis Thompson", "Harris English", "Christiaan Bezuidenhout", "Erik van Rooyen", "Thorbjørn Olesen", "Nicolai Højgaard"]
          }
        },
        "2025-masters": { name: "2025 Masters", year: "2025", tournId: "TODO-get-from-schedule", teams: createTeamsObj() },
        "2025-pga-championship": { name: "2025 PGA Championship", year: "2025", tournId: "TODO-get-from-schedule", teams: createTeamsObj() },
        "2025-us-open": { name: "2025 U.S. Open", year: "2025", tournId: "TODO-get-from-schedule", teams: createTeamsObj() },
        "2025-the-open": { name: "2025 The Open Championship", year: "2025", tournId: "TODO-get-from-schedule", teams: createTeamsObj() },
        "2024-masters": { name: "2024 Masters", year: "2024", tournId: "TODO-get-from-schedule", teams: createTeamsObj() },
        "2024-valspar": { name: "2024 Valspar Championship", year: "2024", tournId: "475", teams: createTeamsObj() }
      },
      currentTournamentKey: "2026-masters"
    };

    let config = JSON.parse(localStorage.getItem('fantasyGolfConfig')) || defaultConfig;
    if (!localStorage.getItem('fantasyGolfConfig')) localStorage.setItem('fantasyGolfConfig', JSON.stringify(config));

    let currentLeaderboardData = null;
    let dataCache = {};
    let isTournamentOver = false;
    let refreshInterval = null;
    let currentModalTeam = null;

    const RAPIDAPI_KEY = "e055e416ddmsh5f6b17a6f1eb52dp19a93cjsncf505c7264e2";
    const RAPIDAPI_HOST = "live-golf-data.p.rapidapi.com";

    // ==================== HELPERS ====================
    function isRefreshWindow() {
      const now = new Date();
      const etHour = parseInt(new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/New_York',
        hour: 'numeric',
        hour12: false
      }).format(now), 10);
      return etHour >= 7 && etHour < 20; // 7AM–7:59PM ET
    }

    async function fetchRapidAPI(endpoint, params = {}) {
      const url = new URL(`https://${RAPIDAPI_HOST}${endpoint}`);
      Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
      try {
        const res = await fetch(url, {
          headers: {
            'x-rapidapi-key': RAPIDAPI_KEY,
            'x-rapidapi-host': RAPIDAPI_HOST
          }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } catch (e) {
        console.error("🚨 RapidAPI fetch failed", e);
        return null;
      }
    }

    async function fetchForTournament(key) {
      if (dataCache[key]) return dataCache[key];
      const tour = config.tournaments[key];
      if (!tour?.year || !tour?.tournId || tour.tournId === "TODO-get-from-schedule") return null;

      const data = await fetchRapidAPI('/leaderboard', { year: tour.year, tournId: tour.tournId });
      if (data) dataCache[key] = data;
      return data;
    }

    function getPlayerScore(playerName, data) {
      if (!data?.leaderboardRows) return { totalToPar: 999, rounds: ["—","—","—","—"], thru: "—", teeTime: "—", isMC: true, status: "—" };
      const p = data.leaderboardRows.find(pl => {
        const full = `${pl.firstName || ''} ${pl.lastName || ''}`.trim().toLowerCase();
        return full === playerName.toLowerCase();
      });
      if (!p) return { totalToPar: 999, rounds: ["—","—","—","—"], thru: "—", teeTime: "—", isMC: true, status: "—" };

      let totalToPar = p.total === "E" ? 0 : parseInt(p.total) || 0;
      const roundsData = p.rounds || [];
      const rounds = Array(4).fill("—");
      roundsData.forEach(r => {
        const idx = (r.roundId || 1) - 1;
        if (idx >= 0 && idx < 4) rounds[idx] = r.scoreToPar === "E" ? "E" : (parseInt(r.scoreToPar) || 0);
      });
      const isMC = ["cut", "wd", "dq"].includes((p.status || "").toLowerCase()) || (p.thru || "").toLowerCase() === "cut";
      return {
        totalToPar,
        rounds,
        thru: p.thru === "-" ? "F" : (p.thru || "—"),
        teeTime: p.teeTime || "—",
        isMC,
        status: p.status || "—"
      };
    }

    function getCutLineWorstToPar(data) {
      if (!data?.leaderboardRows?.length) return 999;
      const madeCutScores = data.leaderboardRows
        .map(p => {
          const scoreObj = getPlayerScore(`${p.firstName} ${p.lastName}`, data);
          return scoreObj.isMC ? null : scoreObj.totalToPar;
        })
        .filter(s => s !== null);
      return madeCutScores.length ? Math.max(...madeCutScores) : 999;
    }

    function calculateTeamScore(teamName, data) {
      if (!data) return { score: 999, players: [] };
      const roster = config.tournaments[config.currentTournamentKey]?.teams?.[teamName] || [];
      if (!roster.length) return { score: 999, players: [] };

      const cutLine = getCutLineWorstToPar(data);
      const playerScores = roster.map(name => {
        const scoreObj = getPlayerScore(name, data);
        const adjusted = scoreObj.isMC ? cutLine : scoreObj.totalToPar;
        return { name, adjusted, raw: scoreObj.totalToPar, isMC: scoreObj.isMC, ...scoreObj };
      });

      // Sort ascending (best to worst), take lowest 4
      playerScores.sort((a, b) => a.adjusted - b.adjusted);
      const best4 = playerScores.slice(0, 4);
      const total = best4.reduce((sum, p) => sum + p.adjusted, 0);

      return { score: total, players: playerScores };
    }

    function isTournamentCompleted(data) {
      if (!data?.leaderboardRows?.length) return false;
      const finishedStatuses = new Set(["f", "finished", "cut", "wd", "dq"]);
      return data.leaderboardRows.every(p => {
        const status = (p.status || p.thru || "").toString().toLowerCase().trim();
        return finishedStatuses.has(status) || status === "f" || status === "-";
      });
    }

    // ==================== DATA LOADING ====================
    async function loadCurrentTournamentData() {
      if (isTournamentOver) return;
      const key = config.currentTournamentKey;
      const data = await fetchForTournament(key);
      if (data) {
        currentLeaderboardData = data;
        isTournamentOver = isTournamentCompleted(data);
        if (isTournamentOver) {
          console.log("%c🏁 Tournament finished – automatic refreshes stopped", "color:#d4af77;font-weight:700");
          if (refreshInterval) clearInterval(refreshInterval);
        }
      }
      updateLastUpdated();
      return data;
    }

    function updateLastUpdated() {
      const el = document.getElementById('last-updated');
      const now = new Date();
      const etTime = now.toLocaleTimeString('en-US', {
        timeZone: 'America/New_York',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      });
      const status = isTournamentOver ? ' – Tournament Complete (refreshes stopped)' : '';
      el.textContent = `Last updated: ${etTime} ET${status}`;
    }

    // ==================== RENDERING ====================
    function renderLeaderboard() {
      const tbody = document.getElementById('leaderboard-body');
      tbody.innerHTML = '';
      const key = config.currentTournamentKey;
      const teamsData = teamNames.map(name => {
        const result = calculateTeamScore(name, currentLeaderboardData);
        return { name, score: result.score };
      }).sort((a, b) => a.score - b.score);

      teamsData.forEach((team, index) => {
        const row = document.createElement('tr');
        row.className = 'border-b border-white/10 last:border-none hover:bg-white/5';
        const rankHTML = index === 0 ? `<span class="rank-1">1</span>` : index === 1 ? `<span class="rank-2">2</span>` : index === 2 ? `<span class="rank-3">3</span>` : `<span>${index + 1}</span>`;
        const displayScore = team.score === 999 ? '—' : (team.score > 0 ? `+${team.score}` : team.score);
        row.innerHTML = `
          <td class="px-8 py-5 font-semibold">${rankHTML}</td>
          <td class="px-8 py-5 font-medium">${team.name}</td>
          <td class="px-8 py-5 text-right font-semibold">${displayScore}</td>
        `;
        tbody.appendChild(row);
      });
    }

    function renderDetailedRosters() {
      const container = document.getElementById('detailed-rosters');
      container.innerHTML = '';
      const key = config.currentTournamentKey;
      const tour = config.tournaments[key];
      if (!tour) return;

      teamNames.forEach(teamName => {
        const roster = tour.teams[teamName] || [];
        const result = calculateTeamScore(teamName, currentLeaderboardData);
        const playersHTML = result.players.map(p => {
          const scoreClass = p.isMC ? 'line-through text-red-400' : (p.adjusted < 0 ? 'under-par' : '');
          const mcLabel = p.isMC ? `<span class="text-xs bg-red-500/80 text-white px-2 py-0.5 rounded-full ml-2">MC → +${p.adjusted}</span>` : '';
          return `
            <div class="flex justify-between items-center bg-white/5 rounded-2xl px-6 py-3">
              <div class="font-medium">${p.name}</div>
              <div class="flex items-center gap-4 text-right">
                <div class="text-sm text-white/70">${p.thru} ${p.rounds.join(' ')}</div>
                <div class="font-semibold ${scoreClass}">${p.adjusted > 0 ? '+' : ''}${p.adjusted}${mcLabel}</div>
              </div>
            </div>`;
        }).join('');

        const card = document.createElement('div');
        card.className = 'card bg-white/10 backdrop-blur-xl rounded-3xl p-6';
        card.innerHTML = `
          <div class="flex justify-between items-baseline mb-6">
            <h3 class="text-2xl font-semibold">${teamName}</h3>
            <div class="text-right">
              <div class="text-sm text-green-300">Best 4 total</div>
              <div class="text-4xl font-bold">${result.score === 999 ? '—' : (result.score > 0 ? `+${result.score}` : result.score)}</div>
            </div>
          </div>
          <div class="space-y-2">${playersHTML || '<p class="text-white/40 italic">No players added yet</p>'}</div>
        `;
        container.appendChild(card);
      });
    }

    function renderLeagueStats() {
      const container = document.getElementById('league-stats');
      container.innerHTML = `
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
          <div class="text-center"><div class="text-5xl font-bold text-[#d4af77]">12</div><div class="text-sm text-white/60">Tournaments Played</div></div>
          <div class="text-center"><div class="text-5xl font-bold text-[#d4af77]">3</div><div class="text-sm text-white/60">Masters Wins</div></div>
          <div class="text-center"><div class="text-5xl font-bold text-[#d4af77]">Gerald</div><div class="text-sm text-white/60">Current Leader (2026)</div></div>
          <div class="text-center"><div class="text-5xl font-bold text-[#d4af77]">2024</div><div class="text-sm text-white/60">Last Champion</div></div>
        </div>
        <p class="text-center text-white/40 text-sm mt-8">Full historical stats coming soon – data stored locally</p>
      `;
    }

    function updateTournamentStatusBadge() {
      const badge = document.getElementById('tournament-status-badge');
      const key = config.currentTournamentKey;
      const name = config.tournaments[key]?.name || 'Tournament';
      badge.textContent = isTournamentOver ? 'COMPLETE' : 'LIVE';
    }

    function renderEverything() {
      renderLeaderboard();
      renderDetailedRosters();
      renderLeagueStats();
      updateTournamentStatusBadge();
    }

    // ==================== REFRESH CYCLE ====================
    function startRefreshCycle() {
      if (refreshInterval) clearInterval(refreshInterval);
      refreshInterval = setInterval(() => {
        if (isTournamentOver) return;
        if (isRefreshWindow()) {
          loadCurrentTournamentData().then(() => renderEverything());
        }
      }, 180000); // 3 minutes
    }

    // ==================== UI POPULATORS ====================
    function populateTournamentSelector() {
      const sel = document.getElementById('tournament-select');
      sel.innerHTML = '';
      Object.keys(config.tournaments).forEach(key => {
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = config.tournaments[key].name;
        if (key === config.currentTournamentKey) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    function populateGearTournamentSelect() {
      const sel = document.getElementById('gear-tournament-select');
      sel.innerHTML = '';
      Object.keys(config.tournaments).forEach(key => {
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = config.tournaments[key].name;
        if (key === config.currentTournamentKey) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    // ==================== MODALS & ACTIONS ====================
    function toggleGearMenu() {
      const menu = document.getElementById('gear-menu');
      menu.classList.toggle('hidden');
    }

    function setCurrentFromGear(key) {
      config.currentTournamentKey = key;
      localStorage.setItem('fantasyGolfConfig', JSON.stringify(config));
      toggleGearMenu();
      isTournamentOver = false;
      currentLeaderboardData = null;
      dataCache = {};
      loadCurrentTournamentData().then(() => renderEverything());
    }

    function switchTournament(newKey) {
      config.currentTournamentKey = newKey;
      localStorage.setItem('fantasyGolfConfig', JSON.stringify(config));
      isTournamentOver = false;
      currentLeaderboardData = null;
      dataCache = {};
      loadCurrentTournamentData().then(() => renderEverything());
      populateTournamentSelector();
      populateGearTournamentSelect();
    }

    function showAddTournamentModal() {
      document.getElementById('add-modal').classList.remove('hidden');
      document.getElementById('add-modal').classList.add('flex');
    }

    function hideAddModal() {
      const modal = document.getElementById('add-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    function addNewTournament() {
      const name = document.getElementById('new-name').value.trim();
      const year = document.getElementById('new-year').value.trim();
      const tournId = document.getElementById('new-tournid').value.trim();
      if (!name || !year || !tournId) {
        alert("Please fill all fields");
        return;
      }
      const key = name.toLowerCase().replace(/\s+/g, '-');
      config.tournaments[key] = {
        name,
        year,
        tournId,
        teams: createTeamsObj()
      };
      localStorage.setItem('fantasyGolfConfig', JSON.stringify(config));
      hideAddModal();
      populateTournamentSelector();
      populateGearTournamentSelect();
      alert(`✅ ${name} added! Use Manage Rosters to assign players.`);
    }

    function openManageRostersModal() {
      toggleGearMenu();
      currentModalTeam = teamNames[0];
      document.getElementById('rosters-modal').classList.remove('hidden');
      document.getElementById('rosters-modal').classList.add('flex');
      const teamSelect = document.getElementById('modal-team-select');
      teamSelect.innerHTML = teamNames.map(n => `<option value="${n}">${n}</option>`).join('');
      teamSelect.value = currentModalTeam;
      loadTeamRosterForModal();
    }

    function hideManageRostersModal() {
      const modal = document.getElementById('rosters-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    function loadTeamRosterForModal() {
      currentModalTeam = document.getElementById('modal-team-select').value;
      const listEl = document.getElementById('modal-roster-list');
      const roster = config.tournaments[config.currentTournamentKey].teams[currentModalTeam] || [];
      listEl.innerHTML = roster.length ? roster.map((player, i) => `
        <div class="flex justify-between items-center bg-white/10 rounded-2xl px-4 py-3">
          <span>${player}</span>
          <button onclick="removePlayerFromModal(${i})" class="text-red-400 hover:text-red-600"><i class="fa-solid fa-trash"></i></button>
        </div>`).join('') : '<p class="text-white/40 italic p-4">No players yet – add some below</p>';
    }

    function addPlayerToCurrentTeam() {
      const input = document.getElementById('new-player-name');
      const name = input.value.trim();
      if (!name || !currentModalTeam) return;
      const tour = config.tournaments[config.currentTournamentKey];
      if (!tour.teams[currentModalTeam]) tour.teams[currentModalTeam] = [];
      if (!tour.teams[currentModalTeam].includes(name)) {
        tour.teams[currentModalTeam].push(name);
      }
      input.value = '';
      loadTeamRosterForModal();
    }

    function removePlayerFromModal(index) {
      const tour = config.tournaments[config.currentTournamentKey];
      tour.teams[currentModalTeam].splice(index, 1);
      loadTeamRosterForModal();
    }

    function saveRostersFromModal() {
      localStorage.setItem('fantasyGolfConfig', JSON.stringify(config));
      hideManageRostersModal();
      renderEverything();
    }

    function openManageTournamentsModal() {
      toggleGearMenu();
      const container = document.getElementById('modal-tournaments-list');
      container.innerHTML = Object.keys(config.tournaments).map(key => {
        const t = config.tournaments[key];
        return `
          <div class="flex justify-between bg-white/10 rounded-3xl px-6 py-4">
            <div>
              <div class="font-semibold">${t.name}</div>
              <div class="text-xs text-white/50">${t.year} • tournId: ${t.tournId}</div>
            </div>
            <button onclick="deleteTournament('${key}')" class="text-red-400 hover:text-red-600 text-sm">Delete</button>
          </div>`;
      }).join('');
      document.getElementById('tournaments-modal').classList.remove('hidden');
      document.getElementById('tournaments-modal').classList.add('flex');
    }

    function hideManageTournamentsModal() {
      const modal = document.getElementById('tournaments-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    function deleteTournament(key) {
      if (confirm(`Delete ${config.tournaments[key].name}?`)) {
        delete config.tournaments[key];
        if (config.currentTournamentKey === key) config.currentTournamentKey = Object.keys(config.tournaments)[0];
        localStorage.setItem('fantasyGolfConfig', JSON.stringify(config));
        hideManageTournamentsModal();
        populateTournamentSelector();
        populateGearTournamentSelect();
        loadCurrentTournamentData().then(() => renderEverything());
      }
    }

    // Fetch schedule helper (unchanged)
    async function fetchAndShowSchedule() {
      toggleGearMenu();
      const year = prompt("Enter year to fetch schedule for (e.g. 2026):", new Date().getFullYear().toString());
      if (!year) return;
      const data = await fetchRapidAPI('/schedule', { year });
      if (!data?.schedule?.length) {
        alert("No schedule data returned.");
        return;
      }
      let html = `<h3 class="text-xl font-bold mb-4">PGA Schedule ${year} – Click to copy tournId</h3><div class="max-h-96 overflow-auto text-sm space-y-2">`;
      data.schedule.forEach(t => {
        html += `<div class="flex justify-between bg-white/10 p-4 rounded-2xl"><span class="font-medium">${t.name || t.tournamentName}</span><button onclick="navigator.clipboard.writeText('${t.tournId}'); this.innerHTML='✅ Copied'" class="font-mono text-[#d4af77]">${t.tournId}</button></div>`;
      });
      html += `</div>`;
      const temp = document.createElement('div');
      temp.innerHTML = `<div onclick="if(event.target===this)this.remove()" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[999]"><div onclick="event.stopImmediatePropagation()" class="bg-[#0a3d2a] border border-[#d4af77] rounded-3xl p-8 max-w-2xl w-full mx-4">${html}</div></div>`;
      document.body.appendChild(temp.firstElementChild);
    }

    // ==================== INIT ====================
    async function init() {
      populateTournamentSelector();
      populateGearTournamentSelect();
      await loadCurrentTournamentData();
      renderEverything();
      startRefreshCycle();
      console.log("%c✅ Phil's Fantasy Golf League – FULLY LOADED • 3-min refresh (7AM–8PM ET) • 2026 Masters tournId: 536", "color:#d4af77; font-weight:700");
    }

    window.onload = init;
  </script>
</body>
</html>
