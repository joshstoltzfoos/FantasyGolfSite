<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fantasy Majors League</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .leaderboard-table tr:hover { background-color: #f3f4f6; }
    .player-pill { transition: all 0.2s; }
  </style>
</head>
<body class="bg-[#0a3d2a] text-white min-h-screen">
  <div class="max-w-6xl mx-auto p-4">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-golf-ball text-4xl"></i>
        <h1 class="text-3xl font-bold">Fantasy Majors League</h1>
      </div>
      
      <!-- Tournament Selector -->
      <div class="flex items-center gap-3">
        <select id="tournament-select" onchange="switchTournament(this.value)" 
                class="bg-white/20 border border-white/30 rounded-xl px-4 py-3 text-white font-medium focus:outline-none focus:border-green-400">
        </select>
        <button onclick="showAddTournamentModal()" 
                class="bg-green-500 hover:bg-green-600 px-5 py-3 rounded-xl flex items-center gap-2 font-medium">
          <i class="fa-solid fa-plus"></i> New Tournament
        </button>
      </div>
      
      <div class="text-sm text-green-300" id="last-updated"></div>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-green-700 mb-6 overflow-x-auto">
      <button onclick="showTab(0)" class="tab-button px-6 py-3 font-medium border-b-2 border-green-400 text-green-400 whitespace-nowrap" id="tab-0">Leaderboard</button>
      <button onclick="showTab(1)" class="tab-button px-6 py-3 font-medium hover:text-green-400 whitespace-nowrap" id="tab-1">Detailed Rosters</button>
      <button onclick="showTab(2)" class="tab-button px-6 py-3 font-medium hover:text-green-400 whitespace-nowrap" id="tab-2">Admin - Manage Rosters</button>
      <button onclick="showTab(3)" class="tab-button px-6 py-3 font-medium hover:text-green-400 whitespace-nowrap" id="tab-3">Manage Tournaments</button>
    </div>

    <!-- Tab 0: Leaderboard -->
    <div id="tab-content-0">
      <table class="w-full leaderboard-table bg-white/10 backdrop-blur rounded-xl overflow-hidden">
        <thead class="bg-green-800">
          <tr>
            <th class="px-6 py-4 text-left">Rank</th>
            <th class="px-6 py-4 text-left">Team</th>
            <th class="px-6 py-4 text-right">Score (best 4)</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body" class="text-lg"></tbody>
      </table>
    </div>

    <!-- Tab 1: Detailed Rosters -->
    <div id="tab-content-1" class="hidden">
      <div id="detailed-rosters" class="space-y-8"></div>
    </div>

    <!-- Tab 2: Admin - Manage Rosters -->
    <div id="tab-content-2" class="hidden bg-white/10 backdrop-blur rounded-2xl p-6">
      <h2 class="text-xl font-bold mb-4">Manage Rosters – <span id="admin-tournament-name" class="text-green-400"></span></h2>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm mb-2">Team</label>
          <select id="admin-team-select" onchange="renderCurrentRoster()" 
                  class="w-full bg-white/20 border border-white/30 rounded-xl px-4 py-3 text-white"></select>
        </div>
      </div>

      <!-- Current Roster -->
      <div id="current-roster" class="mt-6"></div>

      <!-- Player Picker -->
      <div class="mt-8 border-t border-white/30 pt-6">
        <div class="flex justify-between items-center mb-3">
          <h3 class="font-medium">Add players from tournament leaderboard</h3>
          <button onclick="loadAvailablePlayers()" 
                  class="text-green-400 hover:text-green-300 text-sm flex items-center gap-1">
            <i class="fa-solid fa-rotate"></i> Load / Refresh List
          </button>
        </div>
        <input id="player-search" type="text" placeholder="Search player name..." 
               onkeyup="filterPlayerPicker()" 
               class="w-full bg-white/20 border border-white/30 rounded-xl px-4 py-3 text-white mb-4 focus:outline-none">
        <div id="player-picker" class="flex flex-wrap gap-2 max-h-64 overflow-y-auto"></div>
      </div>

      <div class="flex gap-4 mt-8">
        <button onclick="exportFullConfig()" 
                class="flex-1 bg-white text-[#0a3d2a] font-medium py-4 rounded-xl">Export Full Config JSON (share with league)</button>
        <button onclick="showImportModal()" 
                class="flex-1 bg-white/20 hover:bg-white/30 py-4 rounded-xl">Import Config JSON</button>
      </div>
    </div>

    <!-- Tab 3: Manage Tournaments -->
    <div id="tab-content-3" class="hidden bg-white/10 backdrop-blur rounded-2xl p-6">
      <h2 class="text-xl font-bold mb-6">Manage Tournaments</h2>
      <div id="tournaments-list" class="space-y-4"></div>
    </div>
  </div>

  <!-- Add Tournament Modal -->
  <div id="add-modal" onclick="if(event.target===this)hideAddModal()" 
       class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div onclick="event.stopImmediatePropagation()" 
         class="bg-[#0a3d2a] border border-green-400 rounded-3xl p-8 w-full max-w-md mx-4">
      <h3 class="text-2xl font-bold mb-6">Add New Tournament</h3>
      <input id="new-name" placeholder="Tournament Name (e.g. 2026 Masters)" 
             class="w-full bg-white/20 border border-white/30 rounded-2xl px-5 py-4 mb-4 text-white">
      <input id="new-id" placeholder="Tournament ID (from ESPN URL)" type="text"
             class="w-full bg-white/20 border border-white/30 rounded-2xl px-5 py-4 mb-4 text-white">
      <select id="new-league" class="w-full bg-white/20 border border-white/30 rounded-2xl px-5 py-4 mb-6 text-white">
        <option value="pga">PGA Tour (Majors)</option>
      </select>
      <div class="flex gap-4">
        <button onclick="hideAddModal()" class="flex-1 py-4 rounded-2xl border border-white/30">Cancel</button>
        <button onclick="addNewTournament()" class="flex-1 bg-green-500 hover:bg-green-600 py-4 rounded-2xl">Add Tournament</button>
      </div>
    </div>
  </div>

  <!-- Import Modal -->
  <div id="import-modal" onclick="if(event.target===this)hideImportModal()" 
       class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div onclick="event.stopImmediatePropagation()" 
         class="bg-[#0a3d2a] border border-green-400 rounded-3xl p-8 w-full max-w-md mx-4">
      <h3 class="text-2xl font-bold mb-4">Import Config JSON</h3>
      <textarea id="import-text" rows="8" 
                class="w-full bg-white/20 border border-white/30 rounded-2xl px-5 py-4 text-white font-mono text-sm"></textarea>
      <div class="flex gap-4 mt-6">
        <button onclick="hideImportModal()" class="flex-1 py-4 rounded-2xl border border-white/30">Cancel</button>
        <button onclick="importConfig()" class="flex-1 bg-green-500 hover:bg-green-600 py-4 rounded-2xl">Import &amp; Load</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== DEFAULT CONFIG (first load only) ====================
    const defaultConfig = {
      tournaments: {
        "2026-masters": {
          name: "2026 Masters",
          league: "pga",
          tournamentId: "401243005",   // ← Change via UI if needed (or add new tournament)
          teams: {
            "Gerald": ["Jordan Spieth", "Justin Thomas", "Will Zalatoris", "Sepp Straka", "Sergio Garcia", "Nick Dunlap"],
            "Josh": ["Ludvig Aberg", "Bryson DeChambeau", "Cameron Smith", "Brian Harman", "Tom Kim", "Jon Rahm"],
            "Phil": ["Danny McCarthy", "Wyndham Clark", "Sungjae Im", "Jason Day", "Davis Thompson"],
            "Patrick": ["Shane Lowry", "Joquin Niemann", "Tyrrell Hatton", "Keegan Bradley"],
            "Wallace": ["Rory McIlroy", "Matt Fitzpatrick", "Sahith Theegala"],
            "Ricky": ["Collin Morikawa", "Xander Schauffele", "Tommy Fleetwood"],
            "Roger": ["Tony Finau", "Adam Scott", "Justin Rose"],
            "Graham": ["Viktor Hovland", "Phil Mickelson"],
            "Doug": ["Scottie Scheffler", "Brooks Koepka", "Min Woo Lee"],
            "Nick": ["Russell Henley", "Robert MacIntyre", "Billy Horschel"]
          }
        }
      },
      currentTournamentKey: "2026-masters"
    };
    // =============================================================================

    let config = JSON.parse(localStorage.getItem('fantasyGolfConfig')) || defaultConfig;
    if (!localStorage.getItem('fantasyGolfConfig')) {
      localStorage.setItem('fantasyGolfConfig', JSON.stringify(config));
    }

    let currentLeaderboardData = null;
    let dataCache = {};
    let currentAvailablePlayers = [];
    let selectedTeamForAdmin = null;
    let currentTab = 0;

    function saveConfig() {
      localStorage.setItem('fantasyGolfConfig', JSON.stringify(config));
    }

    async function fetchForTournament(tournamentKey) {
      if (dataCache[tournamentKey]) return dataCache[tournamentKey];
      const tour = config.tournaments[tournamentKey];
      if (!tour) return null;
      try {
        const url = `https://site.api.espn.com/apis/site/v2/sports/golf/${tour.league}/leaderboard?tournamentId=${tour.tournamentId}`;
        const res = await fetch(url);
        const data = await res.json();
        dataCache[tournamentKey] = data;
        return data;
      } catch (e) {
        console.error(e);
        return null;
      }
    }

    async function loadCurrentTournamentData() {
      const key = config.currentTournamentKey;
      currentLeaderboardData = await fetchForTournament(key);
      if (currentLeaderboardData) {
        document.getElementById("last-updated").innerHTML = `Last updated: <span class="font-mono">${new Date().toLocaleTimeString()}</span>`;
      }
      return currentLeaderboardData;
    }

    function getPlayerScore(playerName) {
      if (!currentLeaderboardData) return { totalToPar: 0, rounds: ["-","-","-","-"], thru: "—" };
      const playersList = currentLeaderboardData.leaderboard?.players || currentLeaderboardData.players || [];
      const p = playersList.find(pl => 
        (pl.athlete?.displayName || pl.player?.displayName || pl.displayName || "").toLowerCase() === playerName.toLowerCase()
      );
      if (!p) return { totalToPar: 999, rounds: ["—","—","—","—"], thru: "Not found", isMC: true };

      const totalToPar = parseInt(p.score?.displayValue || p.total || p.score?.value || 0) || 0;
      const rounds = (p.rounds || []).map(r => parseInt(r.displayValue || r.value) || 0);
      while (rounds.length < 4) rounds.push(0);

      let thru = p.thru || p.status || "F";
      if (thru === "F" || thru.includes("finished")) thru = "F";
      const isMC = (p.status || "").includes("MC");

      return { totalToPar, rounds: rounds.map(r => r > 0 ? `+${r}` : r.toString()), thru, isMC };
    }

    function calculateTeamScore(teamPlayers) {
      if (!currentLeaderboardData) return 999;
      let scores = teamPlayers.map(name => {
        const s = getPlayerScore(name);
        return s.isMC ? 999 : s.totalToPar;
      });

      const allPlayers = currentLeaderboardData.leaderboard?.players || currentLeaderboardData.players || [];
      const makeCutScores = allPlayers
        .filter(p => !(p.status || "").includes("MC"))
        .map(p => parseInt(p.score?.displayValue || p.total || 0) || 0)
        .sort((a,b) => b - a);
      const worstMakeCut = makeCutScores[0] || 0;

      scores = scores.map(s => s === 999 ? worstMakeCut : s);
      scores.sort((a,b) => a - b);
      return scores.slice(0,4).reduce((a,b) => a + b, 0);
    }

    function renderLeaderboard() {
      const tbody = document.getElementById("leaderboard-body");
      tbody.innerHTML = "";
      const teamScores = Object.keys(config.tournaments[config.currentTournamentKey].teams || {}).map(team => {
        const score = calculateTeamScore(config.tournaments[config.currentTournamentKey].teams[team] || []);
        return { team, score };
      });
      teamScores.sort((a,b) => a.score - b.score);
      teamScores.forEach((entry, i) => {
        const tr = document.createElement("tr");
        tr.className = "border-b border-white/10 last:border-0";
        tr.innerHTML = `
          <td class="px-6 py-5 font-mono">${i+1}</td>
          <td class="px-6 py-5 font-semibold">${entry.team}</td>
          <td class="px-6 py-5 text-right font-mono text-2xl">${entry.score > 0 ? '+' + entry.score : entry.score}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function renderDetailedRosters() {
      const container = document.getElementById("detailed-rosters");
      container.innerHTML = "";
      const teams = config.tournaments[config.currentTournamentKey].teams || {};
      Object.keys(teams).forEach(team => {
        const players = teams[team];
        let html = `<div class="bg-white/10 rounded-2xl p-6"><h3 class="text-xl font-bold mb-4">${team}</h3><table class="w-full text-sm"><thead><tr class="text-green-300"><th class="text-left py-2">Player</th><th class="text-center py-2">R1</th><th class="text-center py-2">R2</th><th class="text-center py-2">R3</th><th class="text-center py-2">R4</th><th class="text-right py-2">Total</th><th class="text-right py-2">Thru</th></tr></thead><tbody>`;
        players.forEach(name => {
          const s = getPlayerScore(name);
          html += `<tr class="border-t border-white/10"><td class="py-3">${name}</td><td class="text-center font-mono">${s.rounds[0]}</td><td class="text-center font-mono">${s.rounds[1]}</td><td class="text-center font-mono">${s.rounds[2]}</td><td class="text-center font-mono">${s.rounds[3]}</td><td class="text-right font-mono text-lg">${s.totalToPar > 0 ? '+' + s.totalToPar : s.totalToPar}</td><td class="text-right font-medium">${s.thru}</td></tr>`;
        });
        html += `</tbody></table></div>`;
        container.innerHTML += html;
      });
    }

    function renderEverything() {
      renderLeaderboard();
      renderDetailedRosters();
    }

    function showTab(n) {
      currentTab = n;
      document.querySelectorAll(".tab-button").forEach((b,i) => {
        b.classList.toggle("border-b-2", i === n);
        b.classList.toggle("border-green-400", i === n);
        b.classList.toggle("text-green-400", i === n);
      });
      document.querySelectorAll("#tab-content-0, #tab-content-1, #tab-content-2, #tab-content-3").forEach((el,i) => el.classList.toggle("hidden", i !== n));
      if (n === 0 || n === 1) renderEverything();
      if (n === 2) {
        document.getElementById("admin-tournament-name").textContent = config.tournaments[config.currentTournamentKey].name;
        populateAdminTeamSelect();
      }
      if (n === 3) renderTournamentsList();
    }

    function populateTournamentSelector() {
      const select = document.getElementById("tournament-select");
      select.innerHTML = "";
      Object.keys(config.tournaments).forEach(key => {
        const tour = config.tournaments[key];
        const opt = document.createElement("option");
        opt.value = key;
        opt.textContent = tour.name;
        if (key === config.currentTournamentKey) opt.selected = true;
        select.appendChild(opt);
      });
    }

    function switchTournament(key) {
      config.currentTournamentKey = key;
      saveConfig();
      currentLeaderboardData = null;
      loadCurrentTournamentData().then(() => renderEverything());
      populateTournamentSelector();
    }

    function showAddTournamentModal() {
      document.getElementById("add-modal").classList.remove("hidden");
      document.getElementById("new-name").focus();
    }

    function hideAddModal() {
      document.getElementById("add-modal").classList.add("hidden");
    }

    function addNewTournament() {
      const name = document.getElementById("new-name").value.trim();
      const tournamentId = document.getElementById("new-id").value.trim();
      const league = document.getElementById("new-league").value;
      if (!name || !tournamentId) {
        alert("Name and Tournament ID are required");
        return;
      }
      const key = name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      config.tournaments[key] = { name, league, tournamentId, teams: {} };
      saveConfig();
      hideAddModal();
      populateTournamentSelector();
      switchTournament(key);
      showTab(3);
    }

    function renderTournamentsList() {
      const container = document.getElementById("tournaments-list");
      container.innerHTML = "";
      Object.keys(config.tournaments).forEach(key => {
        const t = config.tournaments[key];
        const div = document.createElement("div");
        div.className = "bg-white/10 rounded-2xl p-5 flex justify-between items-center";
        div.innerHTML = `
          <div>
            <div class="font-semibold">${t.name}</div>
            <div class="text-xs text-green-300">ID: ${t.tournamentId} • League: ${t.league}</div>
          </div>
          <div class="flex items-center gap-3">
            <button onclick="switchTournament('${key}');showTab(0)" class="text-green-400 hover:text-green-300">Switch</button>
            <button onclick="deleteTournament('${key}')" class="text-red-400 hover:text-red-300">Delete</button>
          </div>
        `;
        container.appendChild(div);
      });
      if (Object.keys(config.tournaments).length === 0) {
        container.innerHTML = `<p class="text-center py-8 text-green-300">No tournaments yet. Add one above!</p>`;
      }
    }

    function deleteTournament(key) {
      if (confirm("Delete this tournament and all its rosters?")) {
        delete config.tournaments[key];
        if (config.currentTournamentKey === key) {
          config.currentTournamentKey = Object.keys(config.tournaments)[0] || "";
        }
        saveConfig();
        populateTournamentSelector();
        renderTournamentsList();
        if (config.currentTournamentKey) loadCurrentTournamentData().then(renderEverything);
      }
    }

    function populateAdminTeamSelect() {
      const select = document.getElementById("admin-team-select");
      select.innerHTML = "";
      const teams = config.tournaments[config.currentTournamentKey].teams || {};
      Object.keys(teams).forEach(team => {
        const opt = document.createElement("option");
        opt.value = team;
        opt.textContent = team;
        select.appendChild(opt);
      });
      if (select.options.length > 0) {
        selectedTeamForAdmin = select.value;
        renderCurrentRoster();
      }
    }

    function renderCurrentRoster() {
      const team = document.getElementById("admin-team-select").value;
      selectedTeamForAdmin = team;
      const div = document.getElementById("current-roster");
      const players = (config.tournaments[config.currentTournamentKey].teams || {})[team] || [];
      let html = `<h4 class="font-medium mb-3">${team} Roster (${players.length}/7)</h4><div class="flex flex-wrap gap-2">`;
      players.forEach((p, i) => {
        html += `<div class="player-pill bg-white/20 px-4 py-2 rounded-2xl flex items-center gap-2"><span>${p}</span><button onclick="removePlayer('${team}', ${i})" class="text-red-400 text-xs ml-2">×</button></div>`;
      });
      html += `</div>`;
      div.innerHTML = html;
    }

    window.removePlayer = function(team, index) {
      const teams = config.tournaments[config.currentTournamentKey].teams;
      teams[team].splice(index, 1);
      saveConfig();
      renderCurrentRoster();
    };

    async function loadAvailablePlayers() {
      const picker = document.getElementById("player-picker");
      picker.innerHTML = `<div class="text-green-300 text-sm w-full text-center py-6">Loading players from ESPN...</div>`;
      const data = await fetchForTournament(config.currentTournamentKey);
      if (!data) {
        picker.innerHTML = `<div class="text-red-400">Could not load players</div>`;
        return;
      }
      const playersList = data.leaderboard?.players || data.players || [];
      currentAvailablePlayers = playersList
        .map(p => p.athlete?.displayName || p.player?.displayName || p.displayName)
        .filter(Boolean)
        .sort((a,b) => a.localeCompare(b));
      currentAvailablePlayers = [...new Set(currentAvailablePlayers)]; // dedupe
      filterPlayerPicker();
    }

    function filterPlayerPicker() {
      const search = document.getElementById("player-search").value.toLowerCase().trim();
      const picker = document.getElementById("player-picker");
      picker.innerHTML = "";
      const filtered = currentAvailablePlayers.filter(name => 
        name.toLowerCase().includes(search)
      );
      if (filtered.length === 0) {
        picker.innerHTML = `<div class="text-green-300 text-sm w-full text-center py-4">No players match your search</div>`;
        return;
      }
      filtered.forEach(name => {
        const btn = document.createElement("button");
        btn.className = "bg-white/10 hover:bg-green-500 hover:text-white px-5 py-2 rounded-3xl text-sm transition-colors";
        btn.textContent = name;
        btn.onclick = () => addPlayerFromPicker(name);
        picker.appendChild(btn);
      });
    }

    function addPlayerFromPicker(name) {
      const teams = config.tournaments[config.currentTournamentKey].teams;
      const team = selectedTeamForAdmin;
      if (!team || !teams[team]) return;
      if (teams[team].length >= 7) {
        alert("Maximum 7 players per team");
        return;
      }
      if (teams[team].includes(name)) return;
      teams[team].push(name);
      saveConfig();
      renderCurrentRoster();
      // keep picker open for more adds
    }

    function exportFullConfig() {
      const json = JSON.stringify(config, null, 2);
      navigator.clipboard.writeText(json).then(() => {
        alert("✅ Full config copied to clipboard!\n\nSend this to your league members. They just paste it into the Import box.");
      });
    }

    function showImportModal() {
      document.getElementById("import-modal").classList.remove("hidden");
    }

    function hideImportModal() {
      document.getElementById("import-modal").classList.add("hidden");
    }

    function importConfig() {
      try {
        const json = document.getElementById("import-text").value.trim();
        const imported = JSON.parse(json);
        config = imported;
        saveConfig();
        hideImportModal();
        populateTournamentSelector();
        loadCurrentTournamentData().then(() => {
          renderEverything();
          showTab(0);
          alert("✅ Config imported successfully!");
        });
      } catch (e) {
        alert("Invalid JSON – please paste the exact config you received");
      }
    }

    // Initial load
    function init() {
      populateTournamentSelector();
      loadCurrentTournamentData().then(() => renderEverything());
      setInterval(() => {
        if (currentTab === 0 || currentTab === 1) {
          loadCurrentTournamentData().then(renderEverything);
        }
      }, 30000);
      // Tailwind
      tailwind.config = { content: ["./index.html"] };
    }

    init();
  </script>
</body>
</html>
