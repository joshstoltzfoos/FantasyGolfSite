<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phil's Fantasy Golf League | 2026 Masters</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-image: linear-gradient(rgba(10, 61, 42, 0.9), rgba(10, 61, 42, 0.95)), url('https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Amen_Corner_Augusta_National.jpg/1920px-Amen_Corner_Augusta_National.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    .card { transition: all 0.3s ease; }
    .card:hover { transform: translateY(-2px); border-color: rgba(212, 175, 119, 0.4); }
    .rank-1 { color: #d4af77; } .rank-2 { color: #c0c0c0; } .rank-3 { color: #cd7f32; }
    .under-par { color: #ef4444 !important; font-weight: 700; }
  </style>
</head>
<body class="text-white min-h-screen">
  <div class="max-w-6xl mx-auto p-4 md:p-6">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
      <div class="flex items-center gap-4">
        <div class="bg-[#d4af77] p-3 rounded-2xl">
            <i class="fa-solid fa-golf-ball-tee text-3xl text-[#0a3d2a]"></i>
        </div>
        <div>
          <h1 class="text-4xl font-bold tracking-tight">Phil's Fantasy League</h1>
          <div class="flex items-center gap-2 mt-1">
             <p class="text-green-300 text-sm font-medium">2026 Masters Tournament</p>
             <span id="api-status" class="text-[10px] px-2 py-0.5 rounded-full bg-yellow-500/20 text-yellow-400 border border-yellow-500/50">Syncing...</span>
          </div>
        </div>
      </div>
      <button onclick="manualRefresh()" 
              class="flex items-center gap-2 bg-white/5 hover:bg-white/10 border border-white/20 rounded-2xl px-6 py-3 text-white transition-all">
        <i class="fa-solid fa-arrows-rotate"></i>
        <span class="font-semibold uppercase tracking-wider text-xs">Refresh Data</span>
      </button>
    </div>

    <div id="last-updated" class="text-xs text-green-300/60 font-medium mb-8 text-right italic"></div>

    <div class="mb-12">
      <div class="flex items-baseline justify-between mb-4">
        <h2 class="text-2xl font-bold uppercase tracking-widest">Standings</h2>
        <span class="text-xs text-white/40 italic">*Best 4 scores count</span>
      </div>
      <div class="card bg-black/30 backdrop-blur-xl rounded-3xl p-1 shadow-2xl border border-white/10 overflow-hidden">
        <table class="w-full bg-transparent">
          <thead class="bg-white/5 text-green-300 uppercase text-xs tracking-widest">
            <tr>
              <th class="px-6 py-4 text-left font-bold w-16">Pos</th>
              <th class="px-6 py-4 text-left font-bold">Manager</th>
              <th class="px-6 py-4 text-right font-bold">Total Score</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body" class="text-lg"></tbody>
        </table>
      </div>
    </div>

    <div>
      <h2 class="text-2xl font-bold uppercase tracking-widest mb-6">Team Details</h2>
      <div id="detailed-rosters" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
    </div>
  </div>

  <script>
    const teamRosters = {
      "Christine": ["Aldrich Potgieter", "Justin Thomas", "Wyndham Clark", "Harris English", "Sepp Straka", "Alex Noren", "Min Woo Lee"],
      "Doug": ["Rasmus Neergaard-Petersen", "Nicolai Højgaard", "Marco Penge", "Scottie Scheffler", "Chris Gotterup", "Jon Rahm", "Ryan Fox"],
      "Gerald": ["Robert MacIntyre", "Tyrrell Hatton", "Cameron Young", "Jordan Spieth", "Ludvig Åberg", "Justin Rose", "Zach Johnson"],
      "Josh": ["Patrick Cantlay", "Keegan Bradley", "Brooks Koepka", "Cameron Smith", "Collin Morikawa", "Adam Scott", "Max Homa"],
      "Nick": ["Maverick McNealy", "Ryan Gerard", "Tommy Fleetwood", "Brian Harman", "Matt Fitzpatrick", "Harry Hall", "Sami Välimäki"],
      "Patrick": ["Jacob Bridgeman", "Jake Knapp", "Aaron Rai", "Bubba Watson", "Brandon Holtz", "Sungjae Im", "Fred Couples"],
      "Phil": ["Hideki Matsuyama", "Russell Henley", "Gary Woodland", "Kristoffer Reitan", "Michael Kim", "Nick Taylor", "Sam Burns"],
      "Ricky": ["Rasmus Højgaard", "Corey Conners", "Shane Lowry", "Xander Schauffele", "Viktor Hovland", "Matt McCarty", "Patrick Reed"],
      "Roger": ["Bryson DeChambeau", "Kurt Kitayama", "Akshay Bhatia", "Si Woo Kim", "Ben Griffin", "Daniel Berger", "J.J. Spaun"],
      "Wallace": ["Max Greyserman", "Dustin Johnson", "Sergio Garcia", "Nico Echavarria", "Andrew Novak", "Rory McIlroy", "Jason Day"]
    };

    const teamNames = Object.keys(teamRosters);
    let currentLeaderboardData = null;

    const RAPIDAPI_KEY = "e055e416ddmsh5f6b17a6f1eb52dp19a93cjsncf505c7264e2";
    const RAPIDAPI_HOST = "live-golf-data.p.rapidapi.com";
    const TOURN_ID = "014"; 
    const YEAR = "2026";

    async function loadCurrentTournamentData() {
      const statusEl = document.getElementById('api-status');
      try {
        const url = `https://${RAPIDAPI_HOST}/leaderboard?year=${YEAR}&tournId=${TOURN_ID}`;
        const res = await fetch(url, {
          headers: {
            'x-rapidapi-key': RAPIDAPI_KEY,
            'x-rapidapi-host': RAPIDAPI_HOST
          }
        });
        const data = await res.json();
        
        if (data && data.leaderboardRows) {
          currentLeaderboardData = data.leaderboardRows;
          statusEl.textContent = "🟢 LIVE DATA";
          statusEl.className = "text-[10px] px-2 py-0.5 rounded-full bg-green-500/20 text-green-400 border border-green-500/50";
        } else {
          throw new Error("Data format mismatch");
        }
      } catch (e) {
        console.error("API Error:", e);
        statusEl.textContent = "🔴 CONNECTION ERROR";
        statusEl.className = "text-[10px] px-2 py-0.5 rounded-full bg-red-500/20 text-red-400 border border-red-500/50";
      }
      updateLastUpdated();
    }

    function normalize(str) {
      if (!str) return "";
      return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\(a\)/i, '').replace(/[^a-z0-9 ]/g, "").trim();
    }

    function findPlayer(name, rows) {
      if (!rows) return null;
      const target = normalize(name);
      return rows.find(p => {
        const rowName = normalize(`${p.firstName || ''} ${p.lastName || ''}`);
        return rowName === target || rowName.includes(target) || target.includes(rowName);
      });
    }

    function getPlayerScore(playerName) {
      const fallback = { totalToPar: 0, rounds: ["—","—","—","—"], thru: "Awaiting", teeTime: "—", isMC: false, isDefault: true };
      if (!currentLeaderboardData) return fallback;
      const p = findPlayer(playerName, currentLeaderboardData);
      if (!p) return fallback;

      let scoreVal = 0;
      if (p.total === "E" || p.total === "even") scoreVal = 0;
      else {
        scoreVal = parseInt(p.total);
        if (isNaN(scoreVal)) scoreVal = 0;
      }

      const rounds = ["—","—","—","—"];
      if (p.rounds && Array.isArray(p.rounds)) {
        p.rounds.forEach(r => {
          const idx = parseInt(r.roundId) - 1;
          if (idx >= 0 && idx < 4) rounds[idx] = r.scoreToPar;
        });
      }

      return {
        totalToPar: scoreVal,
        rounds: rounds,
        thru: p.thru || "—",
        teeTime: p.teeTime || "—",
        isMC: ["cut", "wd", "dq"].includes((p.status || "").toLowerCase()),
        isDefault: false
      };
    }

    function getCutLine() {
      if (!currentLeaderboardData) return 0;
      const activeScores = currentLeaderboardData
        .filter(p => !["cut", "wd", "dq"].includes((p.status || "").toLowerCase()))
        .map(p => (p.total === "E" || p.total === "even") ? 0 : parseInt(p.total))
        .filter(s => !isNaN(s));
      return activeScores.length ? Math.max(...activeScores) : 0;
    }

    function calculateTeamScore(teamName) {
      const roster = teamRosters[teamName] || [];
      const cutLine = getCutLine();
      const players = roster.map(name => {
        const s = getPlayerScore(name);
        const adjusted = s.isMC ? cutLine : s.totalToPar;
        return { ...s, name, adjusted };
      });
      players.sort((a, b) => a.adjusted - b.adjusted);
      const score = players.slice(0, 4).reduce((sum, p) => sum + p.adjusted, 0);
      return { score, players };
    }

    function renderLeaderboard() {
      const tbody = document.getElementById('leaderboard-body');
      const sorted = teamNames.map(name => {
          const res = calculateTeamScore(name);
          return { name, score: res.score };
      }).sort((a, b) => a.score - b.score);

      tbody.innerHTML = sorted.map((team, i) => {
        const rank = i === 0 ? `<span class="rank-1">1</span>` : i === 1 ? `<span class="rank-2">2</span>` : i === 2 ? `<span class="rank-3">3</span>` : i + 1;
        const scoreDisp = team.score > 0 ? `+${team.score}` : (team.score === 0 ? 'E' : team.score);
        return `<tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
          <td class="px-6 py-5 font-bold">${rank}</td>
          <td class="px-6 py-5 font-medium">${team.name}</td>
          <td class="px-6 py-5 text-right font-bold text-xl">${scoreDisp}</td>
        </tr>`;
      }).join('');
    }

    function renderDetailedRosters() {
      const container = document.getElementById('detailed-rosters');
      container.innerHTML = teamNames.map(teamName => {
        const res = calculateTeamScore(teamName);
        const playersHTML = res.players.map(p => {
          const scoreClass = p.isMC ? 'line-through text-red-400 opacity-60' : (p.adjusted < 0 ? 'under-par' : '');
          const status = p.isDefault ? `<span class="text-white/20">Syncing...</span>` : 
                        (p.thru === "—" || p.thru === "F") ? `<span class="text-[#d4af77] text-xs font-bold uppercase tracking-tighter">Tee Time: ${p.teeTime}</span>` : `<span class="text-green-400 font-bold uppercase text-xs">Thru: ${p.thru}</span>`;
          
          return `<div class="bg-white/5 border border-white/10 rounded-2xl px-5 py-3 flex items-center justify-between">
            <div class="flex flex-col">
                <span class="font-bold text-sm uppercase tracking-tight">${p.name} ${p.isMC ? '⛳' : ''}</span>
                ${status}
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex gap-2 text-[10px] text-white/30 uppercase font-bold">
                    ${p.rounds.map((r,i) => `<span>R${i+1}:${r}</span>`).join('')}
                </div>
                <div class="font-black text-lg min-w-[40px] text-right ${scoreClass}">${p.adjusted > 0 ? '+' : ''}${p.adjusted === 0 && !p.isDefault ? 'E' : (p.isDefault ? '—' : p.adjusted)}</div>
            </div>
          </div>`;
      }).join('');

      return `<div class="card bg-black/20 backdrop-blur-md rounded-3xl p-6 border border-white/5">
          <div class="flex justify-between items-start mb-6">
            <h3 class="text-xl font-black uppercase text-white/90">${teamName}</h3>
            <div class="text-right">
              <div class="text-[10px] uppercase font-bold text-green-300 tracking-widest">Total</div>
              <div class="text-4xl font-black text-white leading-none">${res.score > 0 ? '+' : ''}${res.score === 0 ? 'E' : res.score}</div>
            </div>
          </div>
          <div class="space-y-3">${playersHTML}</div>
        </div>`;
      }).join('');
    }

    function updateLastUpdated() {
      document.getElementById('last-updated').textContent = `Last server sync: ${new Date().toLocaleTimeString()} ET`;
    }

    function renderEverything() {
      renderLeaderboard();
      renderDetailedRosters();
    }

    function manualRefresh() {
      const btn = document.querySelector('button i');
      btn.classList.add('fa-spin');
      loadCurrentTournamentData().then(() => {
          renderEverything();
          setTimeout(() => btn.classList.remove('fa-spin'), 1000);
      });
    }

    async function init() {
      await loadCurrentTournamentData();
      renderEverything();
      setInterval(manualRefresh, 180000); 
    }

    window.onload = init;
  </script>
</body>
</html>
